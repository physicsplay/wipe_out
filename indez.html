<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#03101e">
<title>Guardians of our Waters · Field Op</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#03101e; --bg1:#071827; --bg2:#0d2740; --bg3:#133b58;
    --panel:rgba(10,24,39,.66);
    --panel2:rgba(16,35,57,.82);
    --panel3:rgba(255,255,255,.04);
    --panel4:rgba(255,255,255,.07);
    --line:rgba(255,255,255,.10);
    --line2:rgba(255,255,255,.22);
    --text:#eef5ff; --dim:#bccee2; --mute:#8298b1;
    --cyan:#74e6ff; --cyan2:#a8f1ff;
    --green:#7df2b4; --amber:#ffd17e; --gold:#ffe090;
    --red:#ff8a8a; --violet:#b6a6ff; --rose:#ffa3c1;
    --shadow:0 22px 56px rgba(0,0,0,.42);
    --shadow-sm:0 8px 22px rgba(0,0,0,.32);
    --r:22px; --r-md:16px; --r-sm:12px; --r-xs:8px;
    --font-display:'Fraunces',Georgia,serif;
    --font-body:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%; margin:0}
  body{
    color:var(--text); font-family:var(--font-body); font-size:15px; line-height:1.55;
    background:
      radial-gradient(circle at 14% 12%, rgba(116,230,255,.10), transparent 30%),
      radial-gradient(circle at 86% 16%, rgba(182,166,255,.10), transparent 28%),
      radial-gradient(circle at 78% 86%, rgba(125,242,180,.07), transparent 30%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 56%, var(--bg0) 100%);
    min-height:100vh; overflow-x:hidden;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }
  ::selection{background:rgba(116,230,255,.34); color:#fff}

  .ambient{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0}
  .wave{
    position:absolute; left:-12%; width:124%; height:240px; border-radius:45%;
    background:linear-gradient(180deg, rgba(116,230,255,.08), transparent);
    filter:blur(18px); animation:drift 24s ease-in-out infinite;
  }
  .wave.w1{bottom:7%; opacity:.55}
  .wave.w2{bottom:0; opacity:.4; transform:scaleX(1.1); animation-duration:30s}
  .wave.w3{bottom:-5%; opacity:.3; animation-duration:36s}
  @keyframes drift{0%,100%{transform:translateX(-3%) rotate(-0.3deg)} 50%{transform:translateX(3%) rotate(0.3deg)}}
  .grain{
    position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.04;
    background-image:radial-gradient(rgba(255,255,255,.7) 1px, transparent 1px);
    background-size:3px 3px; mix-blend-mode:overlay;
  }

  .app{
    position:relative; z-index:2;
    max-width:1280px; margin:0 auto;
    padding:18px clamp(14px,3vw,32px) 60px;
    min-height:100vh; display:flex; flex-direction:column; gap:18px;
  }
  header.topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap}
  .brand{
    display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,.04); border:1px solid var(--line);
    padding:12px 18px; border-radius:18px; box-shadow:var(--shadow-sm); backdrop-filter:blur(10px);
  }
  .brand-mark{
    width:44px; height:44px; border-radius:13px;
    background:linear-gradient(180deg, rgba(116,230,255,.22), rgba(182,166,255,.10));
    border:1px solid rgba(116,230,255,.30);
    display:grid; place-items:center;
    color:var(--cyan); font-size:22px; font-family:var(--font-display);
    text-shadow:0 0 14px rgba(116,230,255,.4);
  }
  .brand h1{margin:0; font-family:var(--font-display); font-weight:600; font-size:18px; letter-spacing:.01em}
  .brand .tag{display:block; color:var(--mute); font-size:12px; margin-top:2px}
  .top-controls{display:flex; gap:10px; flex-wrap:wrap}
  button, .btn{
    border:1px solid var(--line2);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
    color:var(--text); font:inherit; font-weight:500;
    border-radius:14px; padding:11px 16px; cursor:pointer;
    transition:transform .14s ease, border-color .2s, background .2s, box-shadow .2s;
    box-shadow:0 6px 16px rgba(0,0,0,.16);
  }
  button:hover, .btn:hover{transform:translateY(-1px); border-color:rgba(116,230,255,.46)}
  button:active, .btn:active{transform:translateY(1px)}
  button:disabled{opacity:.5; cursor:not-allowed; transform:none}
  button.primary, .btn.primary{
    background:linear-gradient(180deg, rgba(116,230,255,.28), rgba(116,230,255,.12));
    border-color:rgba(116,230,255,.5); color:#e6faff;
  }
  button.success{background:linear-gradient(180deg, rgba(125,242,180,.26), rgba(125,242,180,.10)); border-color:rgba(125,242,180,.5)}
  button.warn{background:linear-gradient(180deg, rgba(255,209,126,.26), rgba(255,209,126,.10)); border-color:rgba(255,209,126,.5)}
  button.ghost{background:rgba(255,255,255,.025)}
  button.big{padding:14px 22px; font-size:16px; border-radius:16px; letter-spacing:.01em}

  .language-row{display:flex; gap:6px; flex-wrap:wrap; align-items:center}
  .language-row .lang-btn{padding:8px 10px; border-radius:12px; font-size:12px; line-height:1.1; box-shadow:none}
  .language-row .lang-btn.active{background:linear-gradient(180deg, rgba(116,230,255,.26), rgba(116,230,255,.10)); border-color:rgba(116,230,255,.52); color:#e6faff}
  .splash-lang-row{justify-content:center; margin-top:10px}

  main{flex:1; min-height:0}
  .screen{
    background:linear-gradient(180deg, rgba(8,18,30,.5), rgba(8,18,30,.75));
    border:1px solid var(--line); border-radius:28px;
    box-shadow:var(--shadow); backdrop-filter:blur(16px);
    padding:clamp(20px,3vw,34px);
    animation:fadein .35s ease;
  }
  @keyframes fadein{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)}}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:20px; box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
  .panel.soft{background:rgba(255,255,255,.045)}
  .panel.tight{padding:14px}

  .display{font-family:var(--font-display); font-weight:600; font-size:clamp(34px, 5.6vw, 60px); line-height:1.02; letter-spacing:-.01em; margin:0 0 14px}
  .display em{font-style:italic; font-weight:500; color:var(--cyan2)}
  h2.section{font-family:var(--font-display); font-weight:600; font-size:26px; margin:0 0 12px}
  h3{font-family:var(--font-display); font-weight:500; font-size:20px; margin:0 0 10px}
  h4{font-family:var(--font-body); font-weight:700; font-size:15px; margin:0 0 8px}
  .lead{color:var(--dim); font-size:17px; line-height:1.6; max-width:62ch; margin:0 0 18px}
  .kicker{display:inline-flex; align-items:center; gap:8px; color:var(--cyan); font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; margin-bottom:10px}
  .kicker::before{content:"◌"; opacity:.7}
  .tiny{font-size:12px; color:var(--mute)}
  .mono{font-family:var(--font-mono)}
  .narration{
    font-family:var(--font-display); font-weight:400; font-style:italic;
    font-size:17px; line-height:1.55; color:#d6e9fb;
    border-left:3px solid rgba(116,230,255,.34);
    padding:10px 0 10px 16px; margin:14px 0;
  }
  .flavor{color:#d6e9fb; font-style:italic; border-left:3px solid rgba(116,230,255,.3); padding:8px 0 8px 12px; margin:12px 0}
  .chip{display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; background:rgba(255,255,255,.05); border:1px solid var(--line); color:var(--dim); font-size:12px; font-weight:500}
  .chip.cyan{background:rgba(116,230,255,.10); border-color:rgba(116,230,255,.28); color:var(--cyan)}
  .chip.green{background:rgba(125,242,180,.10); border-color:rgba(125,242,180,.30); color:var(--green)}
  .chip.amber{background:rgba(255,209,126,.10); border-color:rgba(255,209,126,.30); color:var(--amber)}
  .chip.violet{background:rgba(182,166,255,.10); border-color:rgba(182,166,255,.30); color:var(--violet)}
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 16px}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:18px}
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px}
  .stack{display:grid; gap:14px}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center}
  .actions{display:flex; gap:12px; flex-wrap:wrap; margin-top:18px}
  @media (max-width: 780px){.grid2,.grid3,.grid4{grid-template-columns:1fr} .topbar{flex-direction:column; align-items:stretch}}

  label{display:block; margin-bottom:8px; color:var(--dim); font-size:13px; font-weight:500}
  input, select, textarea{
    width:100%; border-radius:14px; border:1px solid var(--line2);
    background:rgba(0,0,0,.22); color:var(--text);
    padding:13px 14px; font:inherit; outline:none;
    transition:border-color .18s, box-shadow .18s;
  }
  input:focus, select:focus, textarea:focus{border-color:rgba(116,230,255,.5); box-shadow:0 0 0 3px rgba(116,230,255,.12)}
  input.code-input{font-family:var(--font-mono); font-weight:600; font-size:22px; letter-spacing:.4em; text-align:center; text-transform:uppercase}

  /* Splash */
  .splash{text-align:center; padding:clamp(30px,6vw,60px) 20px}
  .splash .crest{
    width:120px; height:120px; margin:0 auto 24px; border-radius:30px;
    background:
      radial-gradient(circle at 50% 40%, rgba(116,230,255,.5), transparent 70%),
      linear-gradient(180deg, rgba(116,230,255,.16), rgba(182,166,255,.08));
    border:1px solid rgba(116,230,255,.34);
    display:grid; place-items:center;
    box-shadow:0 0 60px rgba(116,230,255,.18), inset 0 0 30px rgba(255,255,255,.05);
    animation:crestpulse 4.5s ease-in-out infinite;
  }
  @keyframes crestpulse{
    0%,100%{transform:scale(1); box-shadow:0 0 60px rgba(116,230,255,.18), inset 0 0 30px rgba(255,255,255,.05)}
    50%{transform:scale(1.04); box-shadow:0 0 90px rgba(116,230,255,.32), inset 0 0 40px rgba(255,255,255,.08)}
  }
  .splash .crest svg{width:62px; height:62px}
  .splash h1.title{font-family:var(--font-display); font-weight:600; font-size:clamp(40px,7vw,72px); margin:0 0 8px; line-height:1.02; letter-spacing:-.015em}
  .splash .subtitle{color:var(--dim); font-size:18px; max-width:50ch; margin:0 auto 28px}
  .splash .meta-row{display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:30px}

  /* Mode picker */
  .mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:18px}
  @media (max-width:860px){.mode-grid{grid-template-columns:1fr}}
  .mode-card{
    position:relative;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    border:1px solid var(--line2); border-radius:24px;
    padding:26px; cursor:pointer;
    transition:transform .22s, border-color .22s, box-shadow .22s;
    overflow:hidden;
  }
  .mode-card::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 0%, var(--card-glow,rgba(116,230,255,.16)), transparent 60%);
    opacity:.7;
  }
  .mode-card:hover{transform:translateY(-3px); border-color:rgba(116,230,255,.46); box-shadow:0 24px 50px rgba(0,0,0,.34), 0 0 40px var(--card-glow,rgba(116,230,255,.18))}
  .mode-card.violet{--card-glow:rgba(182,166,255,.20)}
  .mode-card .illus{
    width:100%; aspect-ratio:16/9; margin-bottom:20px;
    background:rgba(0,0,0,.18); border-radius:18px; border:1px solid var(--line);
    display:grid; place-items:center; overflow:hidden;
  }
  .mode-card .illus svg{width:90%; height:90%}
  .mode-card h3{font-family:var(--font-display); font-weight:600; font-size:26px; margin:0 0 6px}
  .mode-card .sub{color:var(--dim); margin-bottom:14px}
  .mode-card ul{padding:0; margin:0 0 18px; list-style:none; display:grid; gap:8px}
  .mode-card li{padding-left:24px; position:relative; color:var(--dim); font-size:14px}
  .mode-card li::before{content:"◇"; position:absolute; left:6px; color:var(--cyan); font-size:12px}
  .mode-card.violet li::before{color:var(--violet)}

  /* Tutorial */
  .tutorial-shell{display:grid; gap:18px}
  .tutorial-header{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap}
  .step-progress{display:flex; gap:8px; margin:6px 0 18px}
  .step-dot{height:6px; flex:1; border-radius:99px; background:rgba(255,255,255,.08); transition:background .35s}
  .step-dot.active{background:var(--cyan); box-shadow:0 0 10px rgba(116,230,255,.5)}
  .step-dot.done{background:rgba(116,230,255,.34)}
  .tutorial-step{display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:center; animation:slideUp .35s ease}
  @media (max-width:860px){.tutorial-step{grid-template-columns:1fr}}
  @keyframes slideUp{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)}}
  .step-illus{
    aspect-ratio:5/4;
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
    border:1px solid var(--line); border-radius:20px;
    display:grid; place-items:center; overflow:hidden; padding:18px;
  }
  .step-illus svg{width:100%; height:100%; max-height:340px}
  .step-text h3{font-family:var(--font-display); font-weight:600; font-size:30px; line-height:1.1; margin:0 0 14px}
  .step-num{
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%;
    background:rgba(116,230,255,.16); border:1px solid rgba(116,230,255,.40);
    color:var(--cyan); font-family:var(--font-mono); font-weight:600;
    margin-right:10px; vertical-align:middle; font-size:14px;
  }
  .step-text p{color:var(--dim); font-size:16px; line-height:1.6; margin:0 0 12px}
  .step-callout{
    margin-top:14px; padding:12px 14px;
    background:rgba(182,166,255,.10); border:1px solid rgba(182,166,255,.28);
    border-radius:14px; font-size:14px; color:#e4dcff;
  }
  .step-callout strong{color:var(--violet)}
  .tutorial-nav{display:flex; justify-content:space-between; align-items:center; gap:12px; padding-top:16px; border-top:1px solid var(--line)}

  /* Setup */
  .team-input-row{
    display:grid; grid-template-columns:auto 1fr auto; gap:12px;
    background:rgba(255,255,255,.045); border:1px solid var(--line);
    border-radius:16px; padding:12px; align-items:center;
  }
  .team-emoji{
    width:42px; height:42px; border-radius:12px;
    background:rgba(0,0,0,.22); border:1px solid var(--line);
    display:grid; place-items:center; font-size:22px;
  }
  .team-input-row .country-select{width:160px}
  @media (max-width:640px){
    .team-input-row{grid-template-columns:auto 1fr}
    .team-input-row .country-select{grid-column:1/-1; width:100%}
  }
  .count-toggle{display:inline-flex; background:rgba(0,0,0,.22); border-radius:14px; padding:4px; border:1px solid var(--line)}
  .count-toggle button{background:transparent; border:none; padding:10px 22px; border-radius:10px; box-shadow:none; font-weight:600}
  .count-toggle button.active{background:linear-gradient(180deg, rgba(116,230,255,.26), rgba(116,230,255,.12)); border:1px solid rgba(116,230,255,.46)}

  /* Lobby */
  .room-code-box{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    padding:24px; background:rgba(116,230,255,.08);
    border:1px solid rgba(116,230,255,.30); border-radius:22px;
  }
  .room-code{font-family:var(--font-mono); font-weight:600; font-size:54px; letter-spacing:.32em; color:var(--cyan); text-shadow:0 0 22px rgba(116,230,255,.4)}
  .lobby-team-card{display:flex; align-items:center; gap:12px; padding:14px; border-radius:14px; background:rgba(255,255,255,.04); border:1px solid var(--line)}
  .lobby-team-card .status-dot{width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1} 50%{opacity:.4}}
  .lobby-team-card.waiting .status-dot{background:var(--mute); box-shadow:0 0 8px rgba(255,255,255,.18)}

  /* Round play */
  .score-strip{display:grid; grid-template-columns:repeat(var(--cols,2),1fr); gap:12px; margin-bottom:18px}
  .team-card{background:rgba(255,255,255,.045); border:1px solid var(--line); border-radius:18px; padding:14px}
  .team-card .team-head{display:flex; justify-content:space-between; align-items:flex-start; gap:8px}
  .team-card .name{font-weight:700; font-size:15px}
  .team-card .meta{display:flex; gap:8px; flex-wrap:wrap; color:var(--dim); font-size:12px; margin-top:4px}
  .team-card .score{font-family:var(--font-display); font-weight:600; font-size:26px}
  .team-card.active{border-color:rgba(116,230,255,.5); box-shadow:0 0 0 1px rgba(116,230,255,.32) inset, 0 0 24px rgba(116,230,255,.18)}
  .token{padding:3px 8px; border-radius:99px; background:rgba(116,230,255,.10); border:1px solid rgba(116,230,255,.26); color:var(--cyan); font-size:11px; font-weight:600}
  .streak-chip{padding:3px 8px; border-radius:99px; background:rgba(255,209,126,.10); border:1px solid rgba(255,209,126,.32); color:var(--amber); font-size:11px; font-weight:600}
  .streak-chip.hot{background:rgba(255,138,138,.14); border-color:rgba(255,138,138,.4); color:var(--red)}

  .roll-stage{display:grid; place-items:center; gap:24px; min-height:380px; text-align:center; padding:30px 10px}
  .die-wrap{perspective:900px}
  .die{
    width:148px; height:148px; border-radius:30px;
    display:grid; place-items:center;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.10), transparent 50%),
      linear-gradient(180deg, rgba(116,230,255,.24), rgba(182,166,255,.10));
    border:1px solid rgba(116,230,255,.36);
    box-shadow:0 0 50px rgba(116,230,255,.18), inset 0 0 22px rgba(255,255,255,.05);
    font-size:70px; transform-style:preserve-3d; transition:transform .2s;
  }
  .die.rolling{animation:diespin 1.6s cubic-bezier(.2,.7,.2,1)}
  @keyframes diespin{0%{transform:rotateX(0) rotateY(0)} 30%{transform:rotateX(280deg) rotateY(220deg)} 65%{transform:rotateX(540deg) rotateY(470deg)} 100%{transform:rotateX(720deg) rotateY(680deg)}}
  .round-type-label{display:inline-flex; align-items:center; gap:10px; padding:10px 16px; border-radius:99px; background:rgba(116,230,255,.10); border:1px solid rgba(116,230,255,.34); color:var(--cyan); font-weight:700; letter-spacing:.04em}

  .evidence-grid{display:grid; grid-template-columns:1.1fr .9fr; gap:18px}
  @media (max-width:860px){.evidence-grid{grid-template-columns:1fr}}
  .evidence-list{display:grid; gap:10px; padding:0; margin:0; list-style:none}
  .evidence-list li{padding:11px 13px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07)}
  .metric-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .metric{padding:12px; border-radius:14px; background:rgba(255,255,255,.05); border:1px solid var(--line)}
  .metric .m-label{font-size:11px; color:var(--mute); text-transform:uppercase; letter-spacing:.08em}
  .metric .m-value{font-size:15px; font-weight:700; margin-top:4px}

  .handoff-backdrop{position:fixed; inset:0; z-index:30; background:radial-gradient(circle at 50% 50%, rgba(3,15,28,.96), rgba(3,15,28,.99)); display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(8px)}
  .handoff-backdrop.show{display:flex; animation:fadein .25s ease}
  .handoff-card{
    width:min(560px, 100%); text-align:center; padding:34px;
    background:linear-gradient(180deg, rgba(8,20,32,.95), rgba(8,20,32,.99));
    border:1px solid rgba(116,230,255,.32); border-radius:26px;
    box-shadow:0 0 80px rgba(116,230,255,.18);
  }
  .handoff-icon{
    width:96px; height:96px; margin:0 auto 18px; border-radius:24px;
    background:rgba(116,230,255,.10); border:1px solid rgba(116,230,255,.32);
    display:grid; place-items:center;
  }
  .handoff-icon svg{width:60px; height:60px}
  .handoff-card h2{font-family:var(--font-display); font-weight:600; font-size:30px; margin:0 0 8px}
  .handoff-card p{color:var(--dim); margin:0 0 22px}

udi","Aspettare la prossima stagione"],"correct":0},{"text":"Qual è il passo di collaborazione più responsabile?","points":1,"role":"civic","options":["Condividere i risultati collegati tra le squadre prima di finalizzare conclusioni pubbliche","Tenere tutti i dati privati fino alla fine dell’anno","Pubblicare conclusioni separate senza confrontare le prove","Lasciare che la squadra più veloce decida per tutti"],"correct":0}],"explanation":"La spiegazione più forte è un percorso di nutrienti collegato: pressione da deflusso a monte, trasporto attraverso il drenaggio e stress di eutrofizzazione a valle.","perfectLine":"Avete notato il sistema invece dei soli sintomi. Eccellente."},{"type":"Policy Window","title":"La scuola come bacino idrografico","location":"Campus scolastico e area pavimentata adiacente","conditions":"Segnalazioni ripetute di perdita d’acqua inutile e allagamenti ai bordi degli scarichi","observations":["Un rubinetto esterno perde continuamente.","La maggior parte dell’acqua piovana dal cortile scorre direttamente negli scarichi.","Nel campus c’è pochissima copertura del suolo permeabile."],"data":{"Uso dell’acqua scolastica questo mese":"Insolitamente alto","Audit perdite":"Perdite confermate non risolte","Sistemi di raccolta pioggia":"Assenti","Deflusso superficiale dopo temporali":"Alto"},"flavor":"Il campus partecipa al ciclo dell’acqua in modo piuttosto aggressivo.","extraClue":"La perdita dal rubinetto è abbastanza misurabile da influire sui totali mensili di uso dell’acqua.","questions":[{"text":"Qual è il problema principale?","points":2,"role":"diag","options":["Cattiva gestione dell’acqua e alto deflusso legati all’infrastruttura del campus","Improvvisa intrusione salina dal mare","Sversamento tossico industriale","Collasso naturale stagionale dell’ossigeno"],"correct":0},{"text":"Quale prova è più utile in questo momento?","points":2,"role":"evid","options":["Bilancio idrico della scuola e dati dell’audit delle perdite","Numero di biciclette parcheggiate vicino al cancello","Voti di storia","Forme delle nuvole sopra il campo da calcio"],"correct":0},{"text":"Qual è la migliore prima azione?","points":3,"role":"action","options":["Riparare le perdite e progettare un piano pilota di raccolta pioggia / superfici permeabili","Lanciare una campagna di slogan senza cambiare l’infrastruttura","Sostituire tutti i poster di scienze","Ignorare la perdita perché è solo un rubinetto"],"correct":0},{"text":"Quale passo politico è più appropriato?","points":1,"role":"civic","options":["Presentare le prove alla dirigenza scolastica e alla gestione delle strutture con un piano d’azione misurabile","Pubblicare messaggi anonimi di colpa online","Non fare nulla fino all’anno prossimo","Sostituire prima le tende dell’aula"],"correct":0}],"explanation":"È un problema di gestione e infrastruttura. La risposta corretta è un cambiamento operativo basato su prove: riparare le perdite, ridurre il deflusso e formalizzare il piano.","perfectLine":"Pratico, misurabile e piacevolmente privo di simbolismo vuoto."}];
const ROUNDS_HINTS_EL = [["Πρώτα ήρθε η δυνατή βροχή. Μετά άλλαξαν τρία πράγματα μαζί: πιο θολό νερό, σκουπίδια στα φρεάτια, γρηγορότερη ροή. Σκεφτείτε ποια φυσική διαδικασία δημιουργεί και τα τρία όταν το νερό συναντά μια ασφαλτοστρωμένη περιοχή.","Χρήσιμο στοιχείο σημαίνει ότι είναι και <strong>μετρήσιμο</strong> και <strong>συνδεδεμένο με το πρόβλημα</strong>. Τρεις επιλογές δεν έχουν σχέση με το νερό — είναι σκηνικό, όχι δεδομένα.","Η έρευνα ξεκινά με εντοπισμό της πηγής <em>πριν</em> ανακοινωθεί συμπέρασμα. Τρεις επιλογές παρακάμπτουν αυτό το βήμα. Ποια προσπαθεί πραγματικά να καταλάβει τι μπαίνει στο ρέμα;","Διαλέξτε το κοινό που έχει και αρμοδιότητα να δράσει και άμεσο ενδιαφέρον για το ρέμα. Τα άλλα τρία είναι διακοσμητικά."],["Τρεις λανθασμένες απαντήσεις χρειάζονται αιτία που δεν υπάρχει στα δεδομένα: όχι αλάτι δρόμων, όχι μεταλλικά από μεταλλεία, όχι όξινη βροχή. Τα δεδομένα δείχνουν φωσφορικά και πρωινό οξυγόνο — ποια διαδικασία θρεπτικών ταιριάζει;","Ταιριάξτε τα συμπτώματα με τους αριθμούς. Δύο τιμές στον πίνακα μιλούν πολύ δυνατά. Το μενού του φαγητού λιγότερο.","Δεν διορθώνεις άνθιση φυκών με σαπούνι ή με αφαίρεση φυτών. Σκεφτείτε <em>έλεγχο πηγής</em>: από πού έρχονται τα θρεπτικά και πώς μειώνονται ανάντη;","Το σωστό μήνυμα δηλώνει την <em>πιθανότητα</em>, προτείνει <em>προσοχή</em> και περιμένει αποτελέσματα. Τα άλλα είτε ψεύδονται, είτε πανικοβάλλουν, είτε κάνουν ότι δεν υπάρχει πρόβλημα."],["Κοιτάξτε τον πίνακα: pH, οξυγόνο, αγωγιμότητα — όλα κανονικά. Μόνο μία παράμετρος εκτινάχθηκε σε 24 ώρες. Τρεις διαγνώσεις είναι <em>χημικές</em>. Μία δεν είναι.","Χρήσιμο στοιχείο εδώ = <strong>πού</strong> είναι τα απορρίμματα, <strong>τι τύπου</strong> είναι και <strong>πού</strong> συσσωρεύονται. Η φάση της σελήνης και τα πουλιά δεν είναι υδατικά δεδομένα.","Μια δράση που τεκμηριώνει ό,τι αφαιρεί είναι δύο φορές πιο χρήσιμη. Συγκεκριμένο + μετρημένο κερδίζει το αόριστο + συμβολικό.","Διαλέξτε συνεργάτη με κάδους και αρμοδιότητα δράσης. Οι αθλητικοί σχολιαστές και τα φανταστικά υπουργεία δεν μαζεύουν σκουπίδια."],["Ειδοποίηση υπερχείλισης + εκκρεμής βακτηριακός έλεγχος + περιοχή κολύμβησης σε χρήση. Τι είδους επιμόλυνση φέρνει μια υπερχείλιση — χημική, βιολογική, φυσική; <em>Υπόδειξη</em>: δεν φαίνεται με το μάτι.","Εμπιστευτείτε το εργαστήριο και την υπηρεσία, όχι τα μάτια σας. Το «φαίνεται καθαρό» έχει παραπλανήσει γενιές κολυμβητών.","Όταν το αποτέλεσμα δεν έχει βγει αλλά η πηγή κινδύνου έχει επιβεβαιωθεί, ποιο είναι το κόστος της σιωπής σε σχέση με το κόστος της προσοχής;","Επικοινωνήστε τον <strong>κίνδυνο</strong> και το <strong>σχέδιο</strong>: χρονικά περιορισμένο, αναλογικό, ειλικρινές. Όχι «σίγουρα τοξικό», όχι «σίγουρα ασφαλές», όχι σιωπή."],["Κάθε ομάδα έχει ένα κομμάτι της ίδιας λεκάνης απορροής. Διαβάστε τα τρία κομμάτια σαν μία ιστορία: είσοδος επάνω, διαδρομή μεταφοράς, συμπτώματα κάτω.","Χρήσιμο στοιχείο εδώ είναι η <strong>αλυσίδα</strong>, όχι μεμονωμένα γεγονότα. Παρουσίες και χρώματα κτιρίων δεν ανήκουν στον χάρτη της λεκάνης.","Ένα συνδεδεμένο πρόβλημα χρειάζεται συνδεδεμένη απάντηση. Ποια επιλογή αναγνωρίζει ότι οι περιοχές μοιράζονται ένα ποτάμι;","Η διεθνής συνεργασία είναι διαδικασία, όχι βάθρο. Η σειρά μετράει: <em>πότε</em> μοιράζονται οι εταίροι τα δεδομένα;"],["Κοιτάξτε τι περιγράφουν τα δεδομένα: βρύση, αυλή, λογαριασμός νερού, απουσία συστημάτων βρόχινου νερού. Οι λάθος απαντήσεις ζητούν θάλασσα, ορυχείο, βιομηχανική διαρροή ή φυσικό γεγονός. Πού δείχνουν τα πραγματικά στοιχεία;","Δύο στοιχεία έχουν βάρος εδώ και τα δύο ζουν σε υπολογιστικά φύλλα. Οι βαθμοί ιστορίας και τα ποδήλατα δεν θα φτιάξουν τη βρύση.","Συνθήματα και αφίσες δεν αλλάζουν μια βρύση που στάζει. Ψάξτε την επιλογή που αλλάζει τη φυσική κατάσταση — επισκευάζει, σχεδιάζει, τεκμηριώνει.","Η πραγματική πολιτική περνά από ανθρώπους με αρμοδιότητα, με αριθμούς και συγκεκριμένο σχέδιο. Δύο λάθος επιλογές παραλείπουν τους αριθμούς· μία παραλείπει τελείως το κοινό."]];
const ROUNDS_HINTS_ES = [["Primero llegó la lluvia intensa. Luego cambiaron tres cosas a la vez: agua más turbia, basura en desagües y flujo más rápido. Piensa qué proceso físico produce las tres cuando el agua encuentra superficies pavimentadas.","Una prueba útil debe ser <strong>medible</strong> y estar <strong>relacionada con el problema</strong>. Tres opciones no tienen nada que ver con el agua: son decorado, no datos.","Una investigación empieza localizando la fuente <em>antes</em> de anunciar un veredicto. Tres opciones se saltan ese paso. ¿Cuál intenta entender qué entra en el arroyo?","Elige el público que tiene autoridad para actuar y relación directa con este arroyo. Los otros tres son decoración."],["Tres respuestas incorrectas necesitan causas que no aparecen en los datos: no hay sal de carretera, metales mineros ni lluvia ácida. Los datos apuntan a fosfatos y oxígeno matinal — ¿qué proceso encaja?","Relaciona los síntomas con los números. Dos valores de la tabla están hablando muy claro. El menú del comedor, menos.","No arreglas una proliferación con jabón ni quitando plantas. Piensa en <em>control de la fuente</em>: ¿de dónde vienen los nutrientes y cómo se reducen aguas arriba?","El mejor mensaje indica la <em>posibilidad</em>, recomienda <em>cautela</em> y espera resultados. Los otros mienten, crean pánico o fingen que no pasa nada."],["Mira la tabla: pH, oxígeno y conductividad son normales. Solo un parámetro se disparó en 24 h. Tres diagnósticos son <em>químicos</em>. Uno no.","Prueba útil aquí = <strong>dónde</strong> está la basura, <strong>qué tipo</strong> es y <strong>dónde</strong> se acumula. La Luna y los pájaros no son datos de agua.","Una respuesta que documenta lo que retira vale el doble. Específico + medido gana a vago + simbólico.","Elige el socio con contenedores y autoridad para actuar. Los comentaristas deportivos y ministerios ficticios no recogen residuos."],["Aviso de desbordamiento + prueba bacteriana pendiente + zona de baño en uso. ¿Qué contaminación trae un desbordamiento: química, biológica o física? <em>Pista</em>: no se ve a simple vista.","Confía en el laboratorio y el servicio público, no en tus ojos. “Parece claro” ha engañado a generaciones de bañistas.","Cuando el resultado aún no llegó pero la fuente de riesgo está confirmada, ¿qué cuesta esperar en silencio frente a recomendar cautela?","Comunica el <strong>riesgo</strong> y el <strong>plan</strong>: temporal, proporcional y honesto. No “tóxico seguro”, no “todo bien”, no silencio."],["Cada equipo tiene una parte de la misma cuenca. Lee las tres partes como una historia: entrada arriba, transporte, síntomas abajo.","La prueba útil aquí es la <strong>cadena</strong>, no hechos aislados. Asistencia escolar y colores de edificios no están en el mapa de la cuenca.","Un problema conectado merece una respuesta conectada. ¿Qué opción reconoce que las regiones comparten un río?","La colaboración internacional es proceso, no podio. Importa el orden: <em>¿cuándo</em> comparten datos los socios?"],["Mira qué describen los datos: un grifo, un patio, una factura de agua y ausencia de sistemas de lluvia. Las respuestas equivocadas invocan mar, mina, vertido industrial o evento natural. ¿Dónde apuntan las pruebas reales?","Dos pruebas pesan aquí y ambas viven en hojas de cálculo. Las notas de historia y las bicicletas no arreglan un grifo.","Los eslóganes y carteles no cambian un grifo que gotea. Busca la opción que cambia la situación física: arreglar, diseñar, documentar.","La política real pasa por personas con autoridad, números y un plan concreto. Dos opciones omiten los números; una omite por completo al público."]];
const ROUNDS_HINTS_IT = [["Prima è arrivata la pioggia intensa. Poi sono cambiate tre cose insieme: acqua più torbida, rifiuti agli scarichi, corrente più veloce. Pensate a quale processo fisico produce tutte e tre quando l’acqua incontra superfici pavimentate.","Una prova utile deve essere <strong>misurabile</strong> e <strong>collegata al problema</strong>. Tre opzioni non hanno nulla a che fare con l’acqua: sono scenario, non dati.","Un’indagine inizia localizzando la fonte <em>prima</em> di annunciare un verdetto. Tre opzioni saltano questo passaggio. Quale prova a capire cosa entra nel torrente?","Scegliete il pubblico che ha sia autorità per agire sia interesse diretto in questo torrente. Gli altri tre sono decorativi."],["Tre risposte sbagliate richiedono cause assenti dai dati: niente sale stradale, metalli minerari o pioggia acida. I dati indicano fosfati e ossigeno mattutino — quale processo da nutrienti corrisponde?","Abbinate sintomi e numeri. Due valori nella tabella parlano forte. Il menù della mensa, meno.","Non risolvi una fioritura con sapone o rimuovendo piante. Pensate al <em>controllo della fonte</em>: da dove arrivano i nutrienti e come si riducono a monte?","Il messaggio corretto segnala la <em>possibilità</em>, consiglia <em>cautela</em> e aspetta i risultati. Gli altri mentono, creano panico o fingono che vada tutto bene."],["Guardate la tabella: pH, ossigeno e conducibilità sono normali. Solo un parametro è aumentato in 24 ore. Tre diagnosi sono <em>chimiche</em>. Una no.","Prova utile qui = <strong>dove</strong> sono i rifiuti, <strong>che tipo</strong> sono e <strong>dove</strong> si accumulano. Luna e uccelli non sono dati sull’acqua.","Una risposta che documenta ciò che rimuove vale il doppio. Specifico + misurato batte vago + simbolico.","Scegliete il partner con bidoni e autorità per agire. Commentatori sportivi e ministeri immaginari non raccolgono rifiuti."],["Avviso di tracimazione + test batterico in attesa + area balneabile in uso. Che contaminazione porta una tracimazione: chimica, biologica o fisica? <em>Suggerimento</em>: non è visibile a occhio nudo.","Fidatevi del laboratorio e del gestore, non degli occhi. “Sembra limpido” ha ingannato generazioni di bagnanti.","Quando il risultato non è arrivato ma la fonte di rischio è confermata, qual è il costo del silenzio rispetto al costo della cautela?","Comunicate il <strong>rischio</strong> e il <strong>piano</strong>: temporaneo, proporzionato, onesto. Non “sicuramente tossico”, non “tutto bene”, non silenzio."],["Ogni squadra ha una fetta dello stesso bacino. Leggete le tre fette come una storia: input in alto, percorso di trasporto, sintomi in basso.","La prova utile qui è la <strong>catena</strong>, non fatti isolati. Presenze scolastiche e colori degli edifici non sono sulla mappa del bacino.","Un problema collegato merita una risposta collegata. Quale opzione riconosce che le regioni condividono un fiume?","La collaborazione internazionale è un processo, non un podio. Conta l’ordine: <em>quando</em> i partner condividono i dati?"],["Guardate cosa descrivono i dati: un rubinetto, un cortile, una bolletta dell’acqua, sistemi di pioggia assenti. Le risposte sbagliate invocano mare, miniera, sversamento industriale o evento naturale. Dove puntano le prove reali?","Due prove hanno peso qui e vivono entrambe nei fogli di calcolo. Voti di storia e biciclette non riparano un rubinetto.","Slogan e poster non cambiano un rubinetto che perde. Cercate l’opzione che cambia la situazione fisica: ripara, progetta, documenta.","La vera politica passa da persone con autorità, numeri e un piano concreto. Due opzioni saltano i numeri; una salta del tutto il pubblico."]];
const HUMOR_EL = {"intro":["Διαβάστε προσεκτικά. Το νερό το έχει ήδη κάνει.","Ίδια στοιχεία. Διαφορετικά συμπεράσματα. Μόνο ένα παίρνει πόντους.","Η αυτοπεποίθηση δεν αντικαθιστά τα δεδομένα.","Τα δεδομένα είναι υπομονετικά. Κι εμείς. Τις περισσότερες φορές."],"waiting":["Ξεχωριστές ομάδες. Κοινές συνέπειες.","Πάρτε τον χρόνο σας. Η λεκάνη απορροής λειτουργεί σε πιο αργό ρολόι.","Οι κλειδωμένες απαντήσεις υπερασπίζονται πιο εύκολα από τις προφορικές."],"results":["Το dataset έβγαλε την κρίση του.","Η ατεκμηρίωτη σιγουριά παραμένει διακοσμητική.","Η επιστήμη είναι γενναιόδωρη με τους προσεκτικούς και σκληρή με τους θορυβώδεις."],"reactionPerfect":["Βαθμονομημένο. Μετρημένο. Ήσυχα εξαιρετικό.","Κάθε απάντηση ευθυγραμμίστηκε με τα στοιχεία. Σπάνιο.","Το ποτάμι δεν έχει κάτι να προσθέσει."],"reactionStrong":["Δυνατή ανάγνωση. Μία λεπτομέρεια ξέφυγε.","Σχεδόν πλήρης ευθυγράμμιση με τα δεδομένα. Μία υπόθεση ταλαντεύτηκε.","Κοντά στην αλήθεια, με μια μικρή γραφική παράκαμψη."],"reactionMixed":["Η μισή εικόνα. Η άλλη μισή κάνει τη δουλειά.","Λίγο συμπέρασμα, λίγη ελπίδα. Μικτό αποτέλεσμα.","Τα στοιχεία ήταν πιο καθαρά από την απάντηση."],"reactionRough":["Δημιουργική ερμηνεία. Τα δεδομένα διαφώνησαν.","Αρκετές λάθος στροφές. Το ποτάμι θυμάται.","Φιλόδοξη ανάγνωση με περιορισμένη βάση."],"reactionZero":["Καμία ευθυγράμμιση με τα στοιχεία. Καμία.","Το dataset κοιτάζει πίσω, σιωπηλό.","Τολμηρή στρατηγική. Ανεπιβεβαίωτα αποτελέσματα."],"winnerLines":["Βαθμονομημένοι. Περίεργοι. Προσεκτικά θριαμβευτές.","Τα στοιχεία συμφωνούν.","Η λεκάνη έχει απόψεις, και αυτή η ομάδα πέτυχε τις περισσότερες.","Ήσυχη αριστεία. Δυνατό κομφετί."]};

"La vostra squadra è l'host. Bloccate ora le vostre risposte. Le altre squadre rispondono sui loro dispositivi.","myAnswerSheet":"Apri il foglio risposte della mia squadra →","allLockedResolve":"Quando tutte le squadre hanno bloccato le risposte, il round si risolve automaticamente.","guestAnswerLead":"Leggete attentamente le prove. Bloccate le risposte della vostra squadra quando siete pronti.","ourAnswerSheet":"Apri il nostro foglio risposte →","scoresUpdate":"Quando tutte le squadre hanno bloccato le risposte, i punteggi si aggiornano su tutti i dispositivi.","notAssigned":"La tua squadra non è ancora assegnata — prova a riconnetterti.","locked":"bloccato ✓","awaiting":"in attesa","fieldObservations":"Osservazioni sul campo","measurements":"Misurazioni","answerSheet":"foglio risposte","lockAllSubmit":"Blocca tutte e quattro le risposte per inviare.","seconds":"secondi","extraClue":"Indizio extra:","verifToken":"Token di verifica (🎟 {n} rimasti)","verifHelp":"Usane uno per sbloccare un indizio extra per questo round.","useToken":"Usa token →","pause":"Pausa","lockAll":"Blocca risposte","lockAllArrow":"Blocca tutte le risposte →","lockAllCount":"Blocca risposte ({done}/{total})","readDataAgain":"Rileggi i dati — lentamente.","showHint":"💡 Mostra suggerimento di ragionamento","pauseConfirm":"Mettere in pausa e chiudere il foglio risposte? Le selezioni saranno conservate; la squadra potrà riaprirlo.","resolution":"soluzione","resolved":"risolto.","answerKey":"Soluzioni","teamsScored":"Come hanno segnato le squadre","perfect":"PERFETTO","noAnswer":"(nessuna risposta)","hintUsed":"💡 suggerimento usato in questo round","revealFinal":"Mostra punteggi finali →","continueRound":"Continua al round {n} →","operationComplete":"Operazione completata. Il dataset ha emesso il suo giudizio.","finalTally":"Conteggio finale","calculating":"Calcolo del verdetto del fiume…","verifyScores":"VERIFICA PUNTEGGI · CONTROLLO INCROCIATO PROVE","countLabel1":"e il fiume decide…","countLabel2":"i dati hanno parlato…","countLabel3":"la squadra vincitrice è…","sharedVictory":"★ VITTORIA CONDIVISA ★","winningTeam":"★ SQUADRA VINCITRICE ★","pointsOut":"punti su 48","finalStandings":"Classifica finale","team":"Squadra","country":"Paese","score":"Punteggio","medals":"Medaglie","playAgain":"Gioca ancora","downloadTrophy":"Scarica card trofeo","resetTip":"Tocca “Ricomincia” nella barra superiore per iniziare una nuova partita dalla schermata iniziale.","trophySubtitle":"Classifica finale · eTwinning 2025–26","trophyWinning":"SQUADRA VINCITRICE","trophyStandings":"CLASSIFICA FINALE","pts":"pt","helpTitle":"Come si gioca","close":"Chiudi","helpP1":"Scegli una modalità nella schermata iniziale:","helpOne":"<strong>Un dispositivo:</strong> 2 o 3 squadre attorno a un portatile o tablet. Lo schermo indica quando passare il dispositivo. Ogni squadra risponde in privato dietro una schermata di privacy.","helpMulti":"<strong>Più dispositivi:</strong> Una squadra crea una stanza e riceve un codice di 4 lettere. Le altre squadre, su dispositivi diversi, in aule o città diverse, entrano con quel codice. Ogni squadra gioca dal proprio dispositivo. I punteggi si aggiornano in diretta.","helpScoring":"<strong>Punteggio:</strong> D1 Diagnosi · 2 pt · D2 Prove · 2 pt · D3 Azione · 3 pt · D4 Civica · 1 pt · = <strong>8 pt/round · 48 totali</strong>.","helpHints":"I suggerimenti di ragionamento sono gratuiti e non danno mai la risposta: orientano il pensiero. Non costano punti, ma usarne uno fa perdere il badge decorativo <em>Unaided</em> per quel round.","helpTokens":"I token di verifica (2 per partita) sbloccano un indizio extra per il round corrente.","resetConfirm":"Ricominciare e tornare all'inizio?","pointOne":"{n} pt","pointMany":"{n} pt","role_diag":"DIAGNOSI","role_evid":"PROVE","role_action":"AZIONE","role_civic":"CIVICA"};



const TUTORIAL_ONE_TEXTS = {"en":[{"headline":"Set up your <em>2 or 3</em> teams.","title":"Name your teams","illus":"tutOne1","body":"On the next screen you'll add <strong>2 or 3 teams</strong> (your choice — never more). Each team picks a name, an icon, and an optional country flag. The teams take turns on the same device throughout the game.","callout":"<strong>Why a privacy curtain?</strong> When it's a team's turn to answer, the others <strong>look away</strong> from the screen. The game's privacy overlay tells everyone when it's time."},{"headline":"Read the round <em>together</em>.","title":"Roll, read, decide","illus":"tutOne2","body":"Each round starts with a die roll — it selects the round type: Field Test · Pollution Alert · Rapid Response · Community Message · Cross-Border Link · Policy Window. All teams read the same evidence card.","callout":"<strong>4 questions per round.</strong> Diagnosis · Evidence · Action · Civic. Total: <strong>8 points</strong>. Six rounds = <strong>48 points</strong>."},{"headline":"Pass the device <em>privately</em>.","title":"Hot-seat phase","illus":"tutOne3","body":"When the screen says <strong>“Pass the device to [Team Name]”</strong>, everyone else looks away. The receiving team taps to reveal the questions, locks their four answers, then hands the device back. Repeat for each team.","callout":"<strong>Reasoning Hints</strong> are free and don't give the answer — they nudge your thinking. <strong>Verification Tokens</strong> (2 per game) unlock one extra clue for the round."},{"headline":"Scores resolve <em>automatically</em>.","title":"Reveal · score · continue","illus":"tutOne4","body":"Once every team has locked answers, the round resolves. Every question has one objectively correct option — there's no judging, no voting. The screen shows what each team scored, the correct answers, and one dry remark per team.","callout":"<strong>End of game</strong> brings a full reveal with confetti, fanfare, and a shareable trophy card. The team with the highest cumulative score wins."}],"bg":[{"headline":"Настройте вашите <em>2 или 3</em> екипа.","title":"Именувайте екипите","illus":"tutOne1","body":"На следващия екран ще добавите <strong>2 или 3 екипа</strong> — никога повече. Всеки екип избира име, икона и по желание държавно знаме. Екипите се редуват на едно и също устройство през цялата игра.","callout":"<strong>Защо екран за поверителност?</strong> Когато е ред на даден екип да отговаря, другите <strong>поглеждат настрани</strong>. Играта казва кога е време."},{"headline":"Прочетете рунда <em>заедно</em>.","title":"Хвърли, прочети, реши","illus":"tutOne2","body":"Всеки рунд започва с хвърляне на зар — той избира типа рунд: Полеви тест · Сигнал за замърсяване · Бърза реакция · Съобщение към общността · Трансгранична връзка · Политическа възможност. Всички екипи четат една и съща карта с доказателства.","callout":"<strong>4 въпроса на рунд.</strong> Диагноза · Доказателства · Действие · Гражданска стъпка. Общо <strong>8 точки</strong>. Шест рунда = <strong>48 точки</strong>."},{"headline":"Предайте устройството <em>насаме</em>.","title":"Фаза „горещ стол“","illus":"tutOne3","body":"Когато екранът покаже <strong>„Предайте устройството на [име на екипа]“</strong>, всички останали гледат настрани. Получаващият екип натиска бутона, вижда въпросите, заключва четирите си отговора и връща устройството. Повтаря се за всеки екип.","callout":"<strong>Подсказките за разсъждение</strong> са безплатни и не дават отговора. <strong>Жетоните за проверка</strong> (2 за игра) отключват една допълнителна следа за рунда."},{"headline":"Точките се изчисляват <em>автоматично</em>.","title":"Разкриване · резултат · продължение","illus":"tutOne4","body":"След като всеки екип заключи отговорите си, рундът се решава. Всеки въпрос има един обективно верен отговор — няма жури, няма гласуване. Екранът показва точките, верните отговори и по един сух коментар за всеки екип.","callout":"<strong>Краят на играта</strong> включва разкриване с конфети, фанфари и трофейна карта. Побеждава екипът с най-висок общ резултат."}],"el":[{"headline":"Ρυθμίστε τις <em>2 ή 3</em> ομάδες σας.","title":"Ονομάστε τις ομάδες","illus":"tutOne1","body":"Στην επόμενη οθόνη θα προσθέσετε <strong>2 ή 3 ομάδες</strong> — ποτέ περισσότερες. Κάθε ομάδα διαλέγει όνομα, εικονίδιο και προαιρετικά σημαία χώρας. Οι ομάδες παίζουν με τη σειρά στην ίδια συσκευή.","callout":"<strong>Γιατί κουρτίνα απορρήτου;</strong> Όταν απαντά μια ομάδα, οι άλλες <strong>κοιτάζουν αλλού</strong>. Το παιχνίδι δείχνει πότε είναι η σειρά της."},{"headline":"Διαβάστε τον γύρο <em>μαζί</em>.","title":"Ρίξε, διάβασε, αποφάσισε","illus":"tutOne2","body":"Κάθε γύρος ξεκινά με ζάρι — επιλέγει τον τύπο γύρου: Έλεγχος πεδίου · Συναγερμός ρύπανσης · Άμεση αντίδραση · Μήνυμα κοινότητας · Διασυνοριακή σύνδεση · Παράθυρο πολιτικής. Όλες οι ομάδες διαβάζουν την ίδια κάρτα στοιχείων.","callout":"<strong>4 ερωτήσεις ανά γύρο.</strong> Διάγνωση · Στοιχεία · Δράση · Κοινωνική/πολιτική επιλογή. Σύνολο <strong>8 πόντοι</strong>. Έξι γύροι = <strong>48 πόντοι</strong>."},{"headline":"Περάστε τη συσκευή <em>ιδιωτικά</em>.","title":"Φάση hot-seat","illus":"tutOne3","body":"Όταν η οθόνη γράψει <strong>«Περάστε τη συσκευή στην [Ομάδα]»</strong>, οι άλλοι κοιτάζουν αλλού. Η ομάδα πατά για να δει τις ερωτήσεις, κλειδώνει τις τέσσερις απαντήσεις και επιστρέφει τη συσκευή.","callout":"Οι <strong>υποδείξεις σκέψης</strong> είναι δωρεάν και δεν δίνουν την απάντηση. Τα <strong>tokens επαλήθευσης</strong> (2 ανά παιχνίδι) ξεκλειδώνουν ένα επιπλέον στοιχείο."},{"headline":"Τα σκορ υπολογίζονται <em>αυτόματα</em>.","title":"Αποκάλυψη · σκορ · συνέχεια","illus":"tutOne4","body":"Όταν όλες οι ομάδες κλειδώσουν απαντήσεις, ο γύρος λύνεται. Κάθε ερώτηση έχει μία αντικειμενικά σωστή επιλογή — χωρίς κριτές, χωρίς ψηφοφορία. Η οθόνη δείχνει πόντους, σωστές απαντήσεις και σχόλιο.","callout":"<strong>Στο τέλος</strong> υπάρχει αποκάλυψη με κομφετί, φανφάρα και κάρτα τροπαίου. Κερδίζει η ομάδα με το μεγαλύτερο συνολικό σκορ."}],"es":[{"headline":"Configura tus <em>2 o 3</em> equipos.","title":"Nombra los equipos","illus":"tutOne1","body":"En la siguiente pantalla añadirás <strong>2 o 3 equipos</strong> — nunca más. Cada equipo elige nombre, icono y una bandera opcional. Los equipos juegan por turnos en el mismo dispositivo.","callout":"<strong>¿Por qué una cortina de privacidad?</strong> Cuando responde un equipo, los demás <strong>miran hacia otro lado</strong>. El juego indica cuándo toca."},{"headline":"Leed la ronda <em>juntos</em>.","title":"Tira, lee, decide","illus":"tutOne2","body":"Cada ronda empieza con una tirada de dado: selecciona el tipo de ronda. Todos los equipos leen la misma tarjeta de pruebas.","callout":"<strong>4 preguntas por ronda.</strong> Diagnóstico · Pruebas · Acción · Cívica. Total: <strong>8 puntos</strong>. Seis rondas = <strong>48 puntos</strong>."},{"headline":"Pasad el dispositivo <em>en privado</em>.","title":"Fase hot-seat","illus":"tutOne3","body":"Cuando la pantalla diga <strong>“Pasa el dispositivo a [Equipo]”</strong>, los demás miran a otro lado. El equipo revela las preguntas, bloquea sus cuatro respuestas y devuelve el dispositivo.","callout":"Las <strong>pistas de razonamiento</strong> son gratis y no dan la respuesta. Los <strong>tokens de verificación</strong> (2 por partida) desbloquean una pista extra."},{"headline":"Las puntuaciones se resuelven <em>automáticamente</em>.","title":"Revelar · puntuar · continuar","illus":"tutOne4","body":"Cuando todos los equipos bloquean respuestas, se resuelve la ronda. Cada pregunta tiene una única opción correcta objetiva — sin jurado ni votación. La pantalla muestra puntos, respuestas correctas y un comentario.","callout":"<strong>Al final</strong> hay revelación con confeti, fanfarria y tarjeta de trofeo. Gana el equipo con mayor puntuación total."}],"it":[{"headline":"Configurate le vostre <em>2 o 3</em> squadre.","title":"Date un nome alle squadre","illus":"tutOne1","body":"Nella schermata successiva aggiungerete <strong>2 o 3 squadre</strong> — mai di più. Ogni squadra sceglie nome, icona e una bandiera opzionale. Le squadre giocano a turno sullo stesso dispositivo.","callout":"<strong>Perché una schermata di privacy?</strong> Quando una squadra risponde, le altre <strong>guardano altrove</strong>. Il gioco indica quando è il momento."},{"headline":"Leggete il round <em>insieme</em>.","title":"Lancia, leggi, decidi","illus":"tutOne2","body":"Ogni round inizia con un dado: seleziona il tipo di round. Tutte le squadre leggono la stessa scheda prove.","callout":"<strong>4 domande per round.</strong> Diagnosi · Prove · Azione · Civica. Totale: <strong>8 punti</strong>. Sei round = <strong>48 punti</strong>."},{"headline":"Passate il dispositivo <em>in privato</em>.","title":"Fase hot-seat","illus":"tutOne3","body":"Quando lo schermo dice <strong>“Passa il dispositivo a [Squadra]”</strong>, tutti gli altri guardano altrove. La squadra rivela le domande, blocca le quattro risposte e restituisce il dispositivo.","callout":"I <strong>suggerimenti di ragionamento</strong> sono gratis e non danno la risposta. I <strong>token di verifica</strong> (2 per partita) sbloccano un indizio extra."},{"headline":"I punteggi si calcolano <em>automaticamente</em>.","title":"Rivela · punteggio · continua","illus":"tutOne4","body":"Quando tutte le squadre bloccano le risposte, il round si risolve. Ogni domanda ha una sola opzione corretta oggettiva — senza giuria né votazione. Lo schermo mostra punti, risposte corrette e un commento.","callout":"<strong>Alla fine</strong> c’è una rivelazione con coriandoli, fanfara e card trofeo. Vince la squadra con il punteggio totale più alto."}]};
const TUTORIAL_MULTI_TEXTS = {"en":[{"headline":"One team <em>creates</em> the room.","title":"Generate a 4-letter code","illus":"tutMulti1","body":"On the next screen, the first team taps <strong>Create Room</strong> and gets a short code like <span class='mono'>WAVE</span>. They share it with the other teams over your videocall chat (Zoom · Meet · Teams). The host team is the one running the session.","callout":"<strong>Zero setup required.</strong> No accounts, no Firebase, no installer. The code connects everyone directly through a public WebRTC broker."},{"headline":"Other teams <em>join</em> with the code.","title":"Lobby fills up","illus":"tutMulti2","body":"Each remote team opens the same page on its own device, taps <strong>Join Room</strong>, and enters the 4-letter code. The host sees the lobby fill with all teams — maximum 2 or 3, including the host.","callout":"<strong>Connection trouble?</strong> School firewalls can block WebRTC. If a team cannot connect after about 20 seconds, switch to One-Device mode and share the host screen."},{"headline":"Every team plays on its <em>own</em> device.","title":"Same evidence, private answers","illus":"tutMulti3","body":"When the host starts the game, every team sees the same evidence card on their device. Each team answers in privacy — no team can see the others' selections. The host's screen drives the pace, but every team types into their own screen.","callout":"<strong>Reasoning Hints</strong> and <strong>Verification Tokens</strong> work exactly as in One-Device mode — every team has their own."},{"headline":"Scores sync <em>live</em>.","title":"Every device updates together","illus":"tutMulti4","body":"When all teams have locked their answers, the round resolves and the score strip updates on every device at the same instant. No host has to read scores aloud. The final celebration plays for everyone simultaneously.","callout":"<strong>Final reveal</strong> — confetti, fanfare, country flags, and a shareable trophy card. Visible on every connected device."}],"bg":[{"headline":"Един екип <em>създава</em> стаята.","title":"Генерирай 4-буквен код","illus":"tutMulti1","body":"Първият екип натиска <strong>Създай стая</strong> и получава код, например <span class='mono'>WAVE</span>. Споделя го с другите екипи в чата на видео срещата. Екипът домакин води сесията.","callout":"<strong>Не е нужна настройка.</strong> Няма акаунти, няма Firebase, няма инсталация. Кодът свързва участниците чрез публичен WebRTC брокер."},{"headline":"Другите екипи <em>влизат</em> с кода.","title":"Лобито се запълва","illus":"tutMulti2","body":"Всеки отдалечен екип отваря същата страница, натиска <strong>Влез в стая</strong> и въвежда кода. Домакинът вижда всички екипи в лобито — максимум 2 или 3, включително домакина.","callout":"<strong>Проблем с връзката?</strong> Училищни защитни стени могат да блокират WebRTC. Ако екип не се свърже, преминете към режим „Едно устройство“ и споделете екрана."},{"headline":"Всеки екип играе на <em>собствено</em> устройство.","title":"Еднакви доказателства, лични отговори","illus":"tutMulti3","body":"Когато домакинът започне играта, всеки екип вижда същата карта с доказателства. Отговорите са лични — никой не вижда изборите на другите.","callout":"<strong>Подсказките</strong> и <strong>жетоните за проверка</strong> работят както в режим „Едно устройство“ — всеки екип има свои."},{"headline":"Резултатите се синхронизират <em>на живо</em>.","title":"Всички устройства се обновяват заедно","illus":"tutMulti4","body":"Когато всички екипи заключат отговорите си, рундът се решава и резултатите се обновяват едновременно на всички устройства.","callout":"<strong>Финално разкриване</strong> — конфети, фанфари, знамена и трофейна карта. Видимо на всяко свързано устройство."}],"el":[{"headline":"Μία ομάδα <em>δημιουργεί</em> το δωμάτιο.","title":"Δημιουργία κωδικού 4 γραμμάτων","illus":"tutMulti1","body":"Η πρώτη ομάδα πατά <strong>Δημιουργία δωματίου</strong> και παίρνει κωδικό όπως <span class='mono'>WAVE</span>. Τον μοιράζεται στο chat της βιντεοκλήσης. Η ομάδα host τρέχει τη συνεδρία.","callout":"<strong>Δεν χρειάζεται ρύθμιση.</strong> Χωρίς λογαριασμούς, Firebase ή εγκατάσταση. Ο κωδικός συνδέει τις ομάδες μέσω δημόσιου WebRTC broker."},{"headline":"Οι άλλες ομάδες <em>μπαίνουν</em> με τον κωδικό.","title":"Το lobby γεμίζει","illus":"tutMulti2","body":"Κάθε απομακρυσμένη ομάδα ανοίγει την ίδια σελίδα, πατά <strong>Σύνδεση σε δωμάτιο</strong> και βάζει τον κωδικό. Ο host βλέπει το lobby να γεμίζει — μέγιστο 2 ή 3 ομάδες, μαζί με τον host.","callout":"<strong>Πρόβλημα σύνδεσης;</strong> Τα σχολικά firewalls μπορεί να μπλοκάρουν WebRTC. Αν μια ομάδα δεν συνδεθεί, γυρίστε σε «Μία συσκευή» και μοιραστείτε την οθόνη του host."},{"headline":"Κάθε ομάδα παίζει στη <em>δική της</em> συσκευή.","title":"Ίδια στοιχεία, ιδιωτικές απαντήσεις","illus":"tutMulti3","body":"Όταν ο host ξεκινήσει, κάθε ομάδα βλέπει την ίδια κάρτα στοιχείων. Κάθε ομάδα απαντά ιδιωτικά — καμία ομάδα δεν βλέπει τις επιλογές των άλλων.","callout":"Οι <strong>υποδείξεις</strong> και τα <strong>tokens επαλήθευσης</strong> λειτουργούν όπως στη λειτουργία μίας συσκευής — κάθε ομάδα έχει τα δικά της."},{"headline":"Τα σκορ συγχρονίζονται <em>ζωντανά</em>.","title":"Όλες οι συσκευές ενημερώνονται μαζί","illus":"tutMulti4","body":"Όταν όλες οι ομάδες κλειδώσουν απαντήσεις, ο γύρος λύνεται και η μπάρα σκορ ενημερώνεται ταυτόχρονα σε όλες τις συσκευές.","callout":"<strong>Τελική αποκάλυψη</strong> — κομφετί, φανφάρα, σημαίες και κάρτα τροπαίου. Ορατή σε κάθε συνδεδεμένη συσκευή."}],"es":[{"headline":"Un equipo <em>crea</em> la sala.","title":"Generar código de 4 letras","illus":"tutMulti1","body":"El primer equipo pulsa <strong>Crear sala</strong> y recibe un código como <span class='mono'>WAVE</span>. Lo comparte en el chat de la videollamada. El equipo anfitrión dirige la sesión.","callout":"<strong>Sin configuración.</strong> Sin cuentas, Firebase ni instalación. El código conecta a todos mediante un broker público WebRTC."},{"headline":"Los otros equipos <em>entran</em> con el código.","title":"El lobby se llena","illus":"tutMulti2","body":"Cada equipo remoto abre la misma página, pulsa <strong>Unirse a sala</strong> e introduce el código. El anfitrión ve el lobby llenarse — máximo 2 o 3 equipos, incluido el anfitrión.","callout":"<strong>¿Problemas de conexión?</strong> Los firewalls escolares pueden bloquear WebRTC. Si un equipo no conecta, cambia a Un dispositivo y comparte la pantalla del anfitrión."},{"headline":"Cada equipo juega en su <em>propio</em> dispositivo.","title":"Mismas pruebas, respuestas privadas","illus":"tutMulti3","body":"Cuando el anfitrión empieza, cada equipo ve la misma tarjeta de pruebas. Cada equipo responde en privado — nadie ve las selecciones de los demás.","callout":"Las <strong>pistas</strong> y los <strong>tokens de verificación</strong> funcionan como en Un dispositivo — cada equipo tiene los suyos."},{"headline":"Las puntuaciones se sincronizan <em>en directo</em>.","title":"Todos los dispositivos se actualizan juntos","illus":"tutMulti4","body":"Cuando todos los equipos bloquean respuestas, se resuelve la ronda y la barra de puntuación se actualiza a la vez en todos los dispositivos.","callout":"<strong>Revelación final</strong> — confeti, fanfarria, banderas y tarjeta de trofeo. Visible en cada dispositivo conectado."}],"it":[{"headline":"Una squadra <em>crea</em> la stanza.","title":"Genera un codice di 4 lettere","illus":"tutMulti1","body":"La prima squadra tocca <strong>Crea stanza</strong> e riceve un codice come <span class='mono'>WAVE</span>. Lo condivide nella chat della videochiamata. La squadra host gestisce la sessione.","callout":"<strong>Nessuna configurazione.</strong> Niente account, Firebase o installazione. Il codice collega tutti tramite un broker WebRTC pubblico."},{"headline":"Le altre squadre <em>entrano</em> con il codice.","title":"La lobby si riempie","illus":"tutMulti2","body":"Ogni squadra remota apre la stessa pagina, tocca <strong>Entra nella stanza</strong> e inserisce il codice. L’host vede la lobby riempirsi — massimo 2 o 3 squadre, incluso l’host.","callout":"<strong>Problemi di connessione?</strong> I firewall scolastici possono bloccare WebRTC. Se una squadra non si connette, passate a Un dispositivo e condividete lo schermo dell’host."},{"headline":"Ogni squadra gioca sul <em>proprio</em> dispositivo.","title":"Stesse prove, risposte private","illus":"tutMulti3","body":"Quando l’host inizia, ogni squadra vede la stessa scheda prove. Ogni squadra risponde in privato — nessuno vede le scelte degli altri.","callout":"I <strong>suggerimenti</strong> e i <strong>token di verifica</strong> funzionano come in Un dispositivo — ogni squadra ha i propri."},{"headline":"I punteggi si sincronizzano <em>in diretta</em>.","title":"Tutti i dispositivi si aggiornano insieme","illus":"tutMulti4","body":"Quando tutte le squadre bloccano le risposte, il round si risolve e la barra punteggi si aggiorna nello stesso momento su tutti i dispositivi.","callout":"<strong>Rivelazione finale</strong> — coriandoli, fanfara, bandiere e card trofeo. Visibile su ogni dispositivo collegato."}]};
function localTutorialSteps(kind){
  const pack = kind === "multi" ? TUTORIAL_MULTI_TEXTS : TUTORIAL_ONE_TEXTS;
  const steps = pack[state.lang] || pack.en;
  return steps.map(s => Object.assign({}, s, { illus: SVG[s.illus] }));
}
function isSupportedLang(lang){ return !!LANGUAGE_META[lang]; }
function txt(key, vars){
  vars = vars || {};
  const pack = UI_TEXT[state.lang] || UI_TEXT.en;
  let value = pack[key] || UI_TEXT.en[key] || key;
  return String(value).replace(/\{(\w+)\}/g, (_, k) => vars[k] !== undefined ? vars[k] : "");
}

const HINT_PACKS = { en:ROUNDS_HINTS, bg:ROUNDS_HINTS_BG, el:ROUNDS_HINTS_EL, es:ROUNDS_HINTS_ES, it:ROUNDS_HINTS_IT };
const HUMOR_PACKS = { en:HUMOR, bg:HUMOR_BG, el:HUMOR_EL, es:HUMOR_ES, it:HUMOR_IT };
const TYPE_LABEL_PACKS = { bg:TYPE_LABELS_BG, el:TYPE_LABELS_EL, es:TYPE_LABELS_ES, it:TYPE_LABELS_IT };
const TYPE_DESC_PACKS = { bg:TYPE_DESCS_BG, el:TYPE_DESCS_EL, es:TYPE_DESCS_ES, it:TYPE_DESCS_IT };

function activeHints(){ return HINT_PACKS[state.lang] || ROUNDS_HINTS; }
function activeHumor(){ return HUMOR_PACKS[state.lang] || HUMOR; }
function typeLabel(type){ return (TYPE_LABEL_PACKS[state.lang] && TYPE_LABEL_PACKS[state.lang][type]) || type; }
function typeDesc(type){ return (TYPE_DESC_PACKS[state.lang] && TYPE_DESC_PACKS[state.lang][type]) || TYPES[type].desc; }
function countryName(code){
  const c = COUNTRIES.find(x => x.code === code);
  if(!c) return code || "";
  return (COUNTRY_NAME_PACKS[state.lang] && COUNTRY_NAME_PACKS[state.lang][code]) || c.name;
}
function formatPoints(n){ return txt(n === 1 ? "pointOne" : "pointMany", { n }); }
function roleLabel(role){ return txt("role_" + role); }
function activeMedals(){
  const pack = MEDAL_TEXT_PACKS[state.lang];
  if(!pack) return MEDALS;
  return MEDALS.map(m => Object.assign({}, m, pack[m.id] || {}));
}
function renderLanguageButtons(containerId){
  const wrap = $(containerId);
  if(!wrap) return;
  wrap.innerHTML = Object.keys(LANGUAGE_META).map(code => {
    const meta = LANGUAGE_META[code];
    const active = code === state.lang;
    return `<button type="button" class="ghost lang-btn ${active ? "active" : ""}" data-lang="${code}" aria-pressed="${active ? "true" : "false"}" title="${escapeHtml(meta.label)}">${meta.short}</button>`;
  }).join("");
  wrap.querySelectorAll("[data-lang]").forEach(btn => {
    on(btn, "click", () => {
      const lang = btn.getAttribute("data-lang");
      if(lang && lang !== state.lang){ playClick(); setLanguage(lang); }
    });
  });
}
function updateChromeText(){
  document.documentElement.lang = (LANGUAGE_META[state.lang] && LANGUAGE_META[state.lang].htmlLang) || "en";
  document.title = txt("docTitle");
  const brandTitle = $("brandTitle"); if(brandTitle) brandTitle.textContent = txt("brandTitle");
  const brandTag = $("brandTag"); if(brandTag) brandTag.textContent = txt("brandTag");
  const audioBtn = $("audioToggle"); if(audioBtn) audioBtn.textContent = txt(state.audioEnabled ? "audioOn" : "audioOff");
  renderLanguageButtons("langButtons");
  renderLanguageButtons("splashLangButtons");
  const helpBtn = $("helpBtn"); if(helpBtn) helpBtn.textContent = txt("help");
  const resetBtn = $("resetBtn"); if(resetBtn) resetBtn.textContent = txt("reset");
  const footerMission = $("footerMission"); if(footerMission) footerMission.textContent = txt("footerMission");
}
function rerenderCurrentScreen(){
  updateChromeText();
  if(!el.screen) return;
  if(state.screen === "splash") renderSplash();
  else if(state.screen === "mode_picker") renderModePicker();
  else if(state.screen === "tutorial_one") renderTutorialOne();
  else if(state.screen === "tutorial_multi") renderTutorialMulti();
  else if(state.screen === "multi_entry") renderMultiEntry();
  else if(state.screen === "setup") renderSetup(state.setupOpts || {});
  else if(state.screen === "lobby") renderLobby();
  else if(state.screen === "round_intro") renderRoundIntro();
  else if(state.screen === "round_play") renderRoundPlay();
  else if(state.screen === "round_results") renderRoundResults();
  else if(state.screen === "final") renderFinal();
}
function setLanguage(lang){
  state.lang = isSupportedLang(lang) ? lang : "en";
  try{ localStorage.setItem("gow_field_op_lang", state.lang); }catch(e){}
  rerenderCurrentScreen();
}

function pickReaction(gain){
  const humor = activeHumor();
  if(gain === 8) return rand(humor.reactionPerfect);
  if(gain >= 6)  return rand(humor.reactionStrong);
  if(gain >= 3)  return rand(humor.reactionMixed);
  if(gain >= 1)  return rand(humor.reactionRough);
  return rand(humor.reactionZero);
}

function unlockAudio(){
  if(state.soundUnlocked) return;
  try{ state.audioCtx = new (window.AudioContext||window.webkitAudioContext)(); state.soundUnlocked = true; }catch(e){}
}
function tone(freq=440, dur=0.12, type="sine", gain=0.02, when=0){
  if(!state.audioEnabled || !state.soundUnlocked || !state.audioCtx) return;
  const ctx = state.audioCtx; const t0 = ctx.currentTime + when;
  const osc = ctx.createOscillator(); const g = ctx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(g).connect(ctx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
function noiseBurst(dur=0.2, gain=0.01, lp=1200){
  if(!state.audioEnabled || !state.soundUnlocked || !state.audioCtx) return;
  const ctx = state.audioCtx;
  const buf = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate*dur)), ctx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++){ data[i] = (Math.random()*2-1)*(1 - i/data.length); }
  const src = ctx.createBufferSource(); const filter = ctx.createBiquadFilter();
  filter.type="lowpass"; filter.frequency.value = lp;
  const g = ctx.createGain(); g.gain.value = gain;
  src.buffer = buf; src.connect(filter).connect(g).connect(ctx.destination);
  src.start();
}
function playClick(){ tone(560, 0.07, "triangle", 0.014); }
function playRoll(){ noiseBurst(0.25, 0.012); tone(180,0.22,"sine",0.018); tone(250,0.18,"triangle",0.012,0.04); }
function playCorrect(){ tone(520,0.14,"sine",0.016); tone(660,0.16,"sine",0.018,0.06); tone(784,0.20,"triangle",0.013,0.12); }
function playWrong(){ tone(240,0.20,"sawtooth",0.011); tone(180,0.26,"triangle",0.010,0.04); }
function playTransition(){ tone(320,0.10,"sine",0.012); tone(440,0.18,"triangle",0.009,0.06); }
function playTick(){ tone(880,0.04,"square",0.005); }
function playDrumKick(){
  if(!state.audioEnabled || !state.soundUnlocked || !state.audioCtx) return;
  const ctx = state.audioCtx; const t0 = ctx.currentTime;
  const osc = ctx.createOscillator(); const g = ctx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(150, t0);
  osc.frequency.exponentialRampToValueAtTime(40, t0+0.18);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.06, t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+0.24);
  osc.connect(g).connect(ctx.destination);
  osc.start(t0); osc.stop(t0+0.26);
}
function playFanfare(){
  tone(523.25, 0.16, "triangle", 0.022, 0.00);
  tone(659.25, 0.16, "triangle", 0.022, 0.10);
  tone(783.99, 0.18, "triangle", 0.022, 0.20);
  tone(1046.5, 0.32, "triangle", 0.024, 0.34);
  tone(1318.5, 0.42, "sine",     0.018, 0.46);
  for(let i=0;i<6;i++){ setTimeout(()=>playDrumKick(), i*60); }
  setTimeout(()=>noiseBurst(0.4, 0.014, 4000), 320);
}
function playConfettiPop(){ noiseBurst(0.08, 0.018, 6000); tone(1200, 0.05, "triangle", 0.008); }
function playDrumRoll(durMs=1200){
  if(!state.audioEnabled || !state.soundUnlocked || !state.audioCtx) return;
  const ticks = Math.floor(durMs/60);
  for(let i=0;i<ticks;i++){
    setTimeout(()=>{
      const gain = 0.004 + (i/ticks)*0.008;
      noiseBurst(0.05, gain, 600+i*8);
    }, i*60);
  }
}
function ambientStart(){
  if(!state.audioEnabled || !state.soundUnlocked || state.ambientId) return;
  state.ambientId = setInterval(()=>{
    if(["splash","mode_picker","tutorial_one","tutorial_multi"].includes(state.screen)){
      tone(132, 1.5, "sine", 0.0019); tone(196, 1.2, "triangle", 0.0014, 0.18);
    } else if(state.screen === "final"){
      tone(196, 1.6, "sine", 0.0022); tone(294, 1.2, "triangle", 0.0016, 0.20);
    } else {
      tone(110, 1.0, "sine", 0.0015); tone(165, 0.8, "triangle", 0.0011, 0.12);
    }
  }, 4200);
}
function ambientStop(){ if(state.ambientId){ clearInterval(state.ambientId); state.ambientId = null; } }
function toggleAudio(){
  state.audioEnabled = !state.audioEnabled;
  updateChromeText();
  if(!state.audioEnabled) ambientStop(); else ambientStart();
}

const confetti = {

  init(){
    this.canvas = $("confetti");
    if(!this.canvas) return;
    try{ this.ctx = this.canvas.getContext("2d"); } catch(e){ this.ctx = null; }
    if(!this.ctx) return;
    this.resize(); window.addEventListener("resize", () => this.resize());
  },
  resize(){
    if(!this.canvas || !this.ctx) return;
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = window.innerWidth * dpr;
    this.canvas.height = window.innerHeight * dpr;
    this.canvas.style.width = window.innerWidth + "px";
    this.canvas.style.height = window.innerHeight + "px";
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  },
  burst(count=120, ox=null, oy=null){
    if(!this.ctx) return;
    const colors = ["#74e6ff","#7df2b4","#ffd17e","#b6a6ff","#ffa3c1","#ffe090","#a8f1ff"];
    const cx = ox !== null ? ox : window.innerWidth/2;
    const cy = oy !== null ? oy : window.innerHeight * 0.35;
    for(let i=0;i<count;i++){
      const ang = Math.random()*Math.PI*2;
      const speed = 6 + Math.random()*10;
      this.particles.push({
        x:cx, y:cy,
        vx:Math.cos(ang)*speed*0.85,
        vy:Math.sin(ang)*speed - 2,
        gravity: 0.18 + Math.random()*0.08,
        rot: Math.random()*Math.PI*2,
        vr: (Math.random()-0.5)*0.3,
        w: 6+Math.random()*8, h: 9+Math.random()*10,
        color: colors[Math.floor(Math.random()*colors.length)],
        life:0, max:160+Math.random()*60,
        shape: Math.random() < 0.4 ? "rect" : (Math.random() < 0.7 ? "strip" : "circle")
      });
    }
    if(!this.running) this.loop();
    playConfettiPop();
  },
  loop(){
    this.running = true;
    const draw = () => {
      if(!this.ctx) return;
      this.ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
      for(let i=this.particles.length-1;i>=0;i--){
        const p = this.particles[i];
        p.life++; p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
        p.vx *= 0.992; p.rot += p.vr;
        const alpha = Math.max(0, 1 - p.life/p.max);
        this.ctx.save();
        this.ctx.globalAlpha = alpha;
        this.ctx.translate(p.x, p.y); this.ctx.rotate(p.rot);
        this.ctx.fillStyle = p.color;
        if(p.shape === "rect"){ this.ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
        else if(p.shape === "strip"){ this.ctx.fillRect(-p.w/2,-p.h/4,p.w,p.h/2); }
        else { this.ctx.beginPath(); this.ctx.arc(0,0,p.w/2,0,Math.PI*2); this.ctx.fill(); }
        this.ctx.restore();
        if(p.life > p.max || p.y > window.innerHeight+40) this.particles.splice(i,1);
      }
      if(this.particles.length > 0) requestAnimationFrame(draw);
      else { this.ctx.clearRect(0,0,window.innerWidth,window.innerHeight); this.running = false; }
    };
    requestAnimationFrame(draw);
  },
  clear(){ this.particles = []; if(this.ctx) this.ctx.clearRect(0,0,window.innerWidth,window.innerHeight); this.running = false; }
};

/* ============================================================
   5) MULTI-DEVICE (PeerJS public broker, zero-setup)
   ============================================================ */
const PEERJS_CDN = "https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js";
const PEER_PREFIX = "gowfieldop2026-";
let peerJsLoadPromise = null;
function loadPeerJs(){
  if(window.Peer) return Promise.resolve();
  if(peerJsLoadPromise) return peerJsLoadPromise;
  peerJsLoadPromise = new Promise((res,rej)=>{
    const s = document.createElement("script");
    s.src = PEERJS_CDN; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  return peerJsLoadPromise;
}
function genRoomCode(){
  const letters = "ABCDEFGHJKLMNPRSTUWXYZ";
  let out = ""; for(let i=0;i<4;i++) out += letters[Math.floor(Math.random()*letters.length)];
  return out;
}
function peerIdFromCode(code){ return PEER_PREFIX + code.toUpperCase(); }
async function hostCreateRoom(){
  await loadPeerJs();
  const code = genRoomCode();
  state.peerCode = code; state.peerRole = "host";
  try{
    state.peer = new Peer(peerIdFromCode(code), { debug: 0 });
  }catch(e){ alert("Could not initialise multi-device mode: " + e.message); return; }
  state.peer.on("open", id => { renderLobby(); });
  state.peer.on("connection", conn => {
    state.peerConns.push(conn);
    conn.on("open", () => { sendStateToGuest(conn); });
    conn.on("data", data => handleHostReceive(conn, data));
    conn.on("close", () => {
      state.peerConns = state.peerConns.filter(c => c !== conn);
      if(state.screen === "lobby") renderLobby();
    });
  });
  state.peer.on("error", err => {
    console.warn("Host peer error:", err);
    const e = $("peerError"); if(e) e.textContent = "Connection error: " + (err.type || "unknown");
  });
}
async function guestJoinRoom(code){
  await loadPeerJs();
  state.peerCode = code.toUpperCase(); state.peerRole = "guest";
  state.peer = new Peer({ debug: 0 });
  state.peer.on("open", id => {
    const conn = state.peer.connect(peerIdFromCode(state.peerCode), { reliable: true });
    state.peerHostConn = conn;
    conn.on("open", () => {
      const myTeam = state.teams[0] || { name:"Team", icon:"🌊", country:null };
      conn.send({ type:"join", persona: myTeam });
    });
    conn.on("data", data => handleGuestReceive(data));
    conn.on("close", () => { state.peerHostConn = null; alert("Disconnected from host."); resetGame(); });
  });
  state.peer.on("error", err => {
    console.warn("Guest peer error:", err);
    const e = $("peerError"); if(e) e.textContent = "Connection error: " + (err.type || "unknown") + ". Check the code or try again.";
  });
}
function sendStateToGuest(conn){
  conn.send({ type:"state", data:{
    screen: state.screen, roundIndex: state.roundIndex,
    teams: state.teams, submissions: state.submissions, teamCount: state.teamCount
  }});
}
function broadcastFromHost(payload){
  state.peerConns.forEach(c => { try{ c.send(payload); }catch(e){} });
}
function handleHostReceive(conn, data){
  if(!data || !data.type) return;
  if(data.type === "join"){
    const teamId = "T" + (state.teams.length + 1);
    const t = newTeam(teamId, data.persona || {});
    t.peerConnId = conn.connectionId || conn.peer;
    state.teams.push(t);
    if(state.teams.length > state.teamCount) state.teamCount = state.teams.length;
    // Tell THIS guest what their team ID is
    try{ conn.send({ type:"assignedTeam", teamId: t.id }); }catch(e){}
    if(state.screen === "lobby") renderLobby();
    broadcastFromHost({ type:"state", data:{ screen:state.screen, teams:state.teams, teamCount:state.teamCount, roundIndex:state.roundIndex }});
  } else if(data.type === "submit"){
    state.submissions[data.teamId] = data.submission;
    if(state.screen === "round_play") checkAllSubmitted();
  }
}
function handleGuestReceive(data){
  if(!data || !data.type) return;
  if(data.type === "assignedTeam"){
    state.myTeamId = data.teamId;
    return;
  }
  if(data.type === "state"){
    state.remoteState = data.data;
    if(data.data.teams) state.teams = data.data.teams;
    if(data.data.teamCount) state.teamCount = data.data.teamCount;
    if(typeof data.data.roundIndex === "number") state.roundIndex = data.data.roundIndex;
    if(data.data.screen){
      state.screen = data.data.screen;
      if(state.screen === "lobby") renderLobby();
      else if(state.screen === "round_intro") renderRoundIntro();
      else if(state.screen === "round_play") renderRoundPlay();
      else if(state.screen === "round_results") renderRoundResults();
      else if(state.screen === "final") renderFinal();
    }
  } else if(data.type === "results"){
    state.submissions = data.submissions || {};
    state.teams = data.teams || state.teams;
    if(data.allRoundResults) state.allRoundResults = data.allRoundResults;
    state.screen = "round_results"; renderRoundResults();
  }
}

function newTeam(id, persona){
  return {
    id,
    name: persona.name || ("Team " + id),
    icon: persona.icon || "🌊",
    country: persona.country || null,
    score:0, perfectRounds:0,
    correctEvidence:0, correctAction:0, correctCivic:0,
    verifTokens:2, verifUsedRound:-1,
    streak:0, bestStreak:0, hintFreeRounds:0,
    fastLocks:0, medals:[]
  };
}
function resetGame(){
  if(state.peer){ try{ state.peer.destroy(); }catch(e){} }
  Object.assign(state, {
    screen:"splash", mode:null, teamCount:2,
    roundIndex:0, teams:[], submissions:{}, allRoundResults:[],
    hintsRevealed:{}, verifShown:{},
    peer:null, peerCode:null, peerRole:null,
    peerConns:[], peerHostConn:null, remoteState:null,
    myTeamId:null,
    tutorialStep:0, finalAnimStep:0, setupOpts:{}
  });
  clearTimer();
  confetti.clear();
  $("revealGlow").classList.remove("on");
  el.modalBackdrop.classList.remove("show");
  el.handoff.classList.remove("show");
  renderSplash();
}

/* ---------- Tutorial (shared shell) ---------- *//* ---------- Tutorial (shared shell) ---------- */
function renderTutorialShell(steps, mode){
  updateChromeText();
  const i = state.tutorialStep;
  const s = steps[i];
  const dots = steps.map((_,k) =>
    `<span class="step-dot ${k===i?"active":(k<i?"done":"")}"></span>`
  ).join("");
  el.screen.innerHTML = `
    <div class="tutorial-shell">
      <div class="tutorial-header">
        <div>
          <div class="kicker">${mode === "one" ? txt("tutorialKickerOne") : txt("tutorialKickerMulti")}</div>
          <h2 class="display">${s.headline}</h2>
        </div>
        <div class="row" style="gap:6px">
          <span class="chip">${i+1} / ${steps.length}</span>
        </div>
      </div>

      <div class="step-progress">${dots}</div>

      <div class="tutorial-step">
        <div class="step-illus">${s.illus}</div>
        <div class="step-text">
          <h3><span class="step-num">${i+1}</span>${s.title}</h3>
          <p>${s.body}</p>
          ${s.callout ? `<div class="step-callout">${s.callout}</div>` : ""}
        </div>
      </div>

      <div class="tutorial-nav">
        <button class="ghost" id="tutPrev">${i === 0 ? txt("modePicker") : txt("previous")}</button>
        <div class="tiny mono">${i+1} ${txt("of")} ${steps.length}</div>
        <button class="primary big" id="tutNext">${i === steps.length-1 ? txt("gotIt") : txt("next")}</button>
      </div>
    </div>
  `;
  on($("tutPrev"), "click", () => {
    playClick();
    if(i === 0){ renderModePicker(); }
    else { state.tutorialStep = i-1; renderTutorialShell(steps, mode); }
  });
  on($("tutNext"), "click", () => {
    playClick();
    if(i === steps.length-1){
      if(mode === "one") renderSetup();
      else renderMultiEntry();
    } else {
      state.tutorialStep = i+1;
      renderTutorialShell(steps, mode);
    }
  });
}
