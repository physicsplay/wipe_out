      <div class="team-emoji">${escapeHtml(t.icon || "🌊")}</div>
      <div class="stack" style="gap:6px">
        <input type="text" class="team-name-input" value="${escapeHtml(t.name)}" placeholder="${txt("teamNamePlaceholder")}" maxlength="32"/>
        <select class="team-persona-select">${personaOptions}</select>
      </div>
      <select class="country-select" data-current="${t.country||""}">${countryOptions}</select>
    </div>
  `).join("");

  const titleText = isMultiHost  ? txt("hostIdentity") :
                    isMultiGuest ? txt("guestIdentity") :
                                   txt("nameYourTeams");

  const subtitleText = isMultiHost  ? txt("hostSubtitle") :
                       isMultiGuest ? txt("guestSubtitle") :
                                      txt("oneSubtitle");

  el.screen.innerHTML = `
    <div class="kicker">${isOneDevice ? txt("setupOneKicker") : (isMultiHost ? txt("setupHostKicker") : txt("setupGuestKicker"))} · ${txt("setupSuffix")}</div>
    <h2 class="display">${titleText}</h2>
    <p class="lead">${subtitleText}</p>
    ${countToggle}
    <div class="stack" id="teamRows">${rows}</div>
    <div class="actions">
      <button class="ghost" id="setupBack">${txt("back")}</button>
      <button class="primary big" id="setupContinue">${isMultiGuest ? txt("connectHost") : (isMultiHost ? txt("openRoom") : txt("beginRound1"))}</button>
    </div>
  `;

  document.querySelectorAll(".team-persona-select").forEach((sel, i) => {
    sel.value = state.teams[i].name;
  });
  document.querySelectorAll(".country-select").forEach((sel, i) => {
    sel.value = state.teams[i].country || "";
  });

  document.querySelectorAll("[data-count]").forEach(btn => {
    on(btn, "click", () => {
      playClick();
      const c = Number(btn.dataset.count);
      if(c === state.teamCount) return;
      state.teamCount = c;
      if(c > state.teams.length){
        const used = new Set(state.teams.map(t => t.name));
        const free = PERSONAS.find(p => !used.has(p.name)) || PERSONAS[3];
        state.teams.push(newTeam("T"+(state.teams.length+1), { name: free.name, icon: free.icon, country: null }));
      } else if(c < state.teams.length){
        state.teams = state.teams.slice(0, c);
      }
      renderSetup(opts);
    });
  });

  document.querySelectorAll("[data-team-idx]").forEach(row => {
    const idx = Number(row.dataset.teamIdx);
    const nameInput = row.querySelector(".team-name-input");
    const personaSel = row.querySelector(".team-persona-select");
    const countrySel = row.querySelector(".country-select");
    const emojiBox = row.querySelector(".team-emoji");
    on(nameInput, "input", () => { state.teams[idx].name = nameInput.value || ("Team " + (idx+1)); });
    on(personaSel, "change", () => {
      const p = PERSONAS.find(x => x.name === personaSel.value);
      if(p){
        state.teams[idx].name = p.name;
        state.teams[idx].icon = p.icon;
        nameInput.value = p.name;
        emojiBox.textContent = p.icon;
      }
    });
    on(countrySel, "change", () => { state.teams[idx].country = countrySel.value || null; });
  });

  on($("setupBack"), "click", () => {
    playClick();
    if(isMultiGuest || isMultiHost) renderMultiEntry();
    else { state.tutorialStep = 0; renderTutorialOne(); }
  });
  on($("setupContinue"), "click", async () => {
    playClick(); playTransition();
    if(isMultiGuest){
      await guestJoinRoom(opts.joinCode);
      renderLobby();
    } else if(isMultiHost){
      await hostCreateRoom();
    } else {
      state.roundIndex = 0;
      state.submissions = {};
      state.allRoundResults = [];
      renderRoundIntro();
    }
  });
}

/* ---------- Lobby (multi-device) ---------- *//* ---------- Lobby (multi-device) ---------- */
function renderLobby(){
  state.screen = "lobby";
  updateChromeText();
  setFoot(txt("lobbyFoot"));
  const isHost = state.peerRole === "host";
  const code = state.peerCode || "----";
  const teams = state.teams || [];
  const slots = isHost ? Math.max(state.teamCount || 2, teams.length) : (state.teamCount || 2);

  let teamCards = "";
  for(let i=0;i<slots;i++){
    const t = teams[i];
    if(t){
      teamCards += `
        <div class="lobby-team-card">
          <div class="status-dot"></div>
          <div class="team-emoji">${escapeHtml(t.icon)}</div>
          <div class="stack" style="gap:2px; flex:1">
            <div style="font-weight:700">${escapeHtml(t.name)}</div>
            <div class="tiny mono">${t.country ? ((COUNTRIES.find(c=>c.code===t.country)||{}).flag + " " + t.country) : "—"}  ·  ${i===0 ? txt("host") : txt("guest")}</div>
          </div>
          <span class="chip green">${txt("connected")}</span>
        </div>
      `;
    } else {
      teamCards += `
        <div class="lobby-team-card waiting">
          <div class="status-dot"></div>
          <div class="team-emoji" style="opacity:.4">?</div>
          <div class="stack" style="gap:2px; flex:1; opacity:.55">
            <div style="font-weight:700">${txt("waitingTeam")}</div>
            <div class="tiny mono">${txt("shareCodeLower", {code})}</div>
          </div>
          <span class="chip">${txt("waiting")}</span>
        </div>
      `;
    }
  }

  let slotPicker = "";
  if(isHost){
    slotPicker = `
      <div class="row" style="margin:14px 0">
        <label style="margin:0">${txt("expectedTeams")}</label>
        <div class="count-toggle">
          <button data-lobby-count="2" class="${state.teamCount===2?"active":""}">${txt("teams2")}</button>
          <button data-lobby-count="3" class="${state.teamCount===3?"active":""}">${txt("teams3")}</button>
        </div>
      </div>
    `;
  }

  el.screen.innerHTML = `
    <div class="kicker">${txt("lobbyKicker")}</div>
    <h2 class="display">${isHost ? txt("roomLive") : txt("connectingHost")}</h2>
    ${isHost ? `
      <div class="grid2" style="margin-top:6px">
        <div class="room-code-box">
          <div class="tiny mono" style="letter-spacing:.2em; color:var(--mute)">${txt("roomCode")}</div>
          <div class="room-code">${escapeHtml(code)}</div>
          <div class="tiny" style="text-align:center">${txt("shareCodeText")}</div>
          <div class="row" style="margin-top:8px">
            <button class="ghost" id="copyCodeBtn">${txt("copyCode")}</button>
          </div>
        </div>
        <div class="panel">
          <h3 style="margin-top:0">${txt("connectedTeams")}</h3>
          ${slotPicker}
          <div class="stack" id="teamSlots">${teamCards}</div>
          <p class="tiny" style="margin-top:14px; color:var(--mute)">${txt("connectedCount", {count:teams.length, slots})}</p>
        </div>
      </div>
      <div class="actions" style="margin-top:18px; justify-content:space-between">
        <button class="ghost" id="lobbyAbort">${txt("cancel")}</button>
        <button class="primary big" id="startGameBtn" ${teams.length < 2 ? "disabled" : ""}>${teams.length < 2 ? txt("needTeams") : txt("startRound1")}</button>
      </div>
    ` : `
      <p class="lead">${txt("guestConnectedLead")}</p>
      <div class="stack" id="teamSlots">${teamCards}</div>
      <p id="peerError" class="tiny" style="margin-top:14px; color:var(--red)"></p>
    `}
  `;

  if(isHost){
    on($("copyCodeBtn"), "click", () => {
      navigator.clipboard?.writeText(code);
      playClick();
      $("copyCodeBtn").textContent = txt("copied");
      setTimeout(()=>{ if($("copyCodeBtn")) $("copyCodeBtn").textContent = txt("copyCode"); }, 1400);
    });
    document.querySelectorAll("[data-lobby-count]").forEach(b => {
      on(b, "click", () => { playClick(); state.teamCount = Number(b.dataset.lobbyCount); renderLobby(); });
    });
    on($("lobbyAbort"), "click", () => { playClick(); resetGame(); });
    on($("startGameBtn"), "click", () => {
      if(state.teams.length < 2) return;
      playTransition();
      state.roundIndex = 0;
      state.submissions = {};
      state.allRoundResults = [];
      state.screen = "round_intro";
      broadcastFromHost({ type:"state", data:{ screen:"round_intro", roundIndex:0, teams:state.teams, teamCount:state.teamCount }});
      renderRoundIntro();
    });
  }
}

        <div class="team-head">
          <div>
            <div class="name">${escapeHtml(team.icon)} ${escapeHtml(team.name)}</div>
            <div class="meta">
              ${team.country ? `<span>${(COUNTRIES.find(c=>c.code===team.country)||{}).flag||""} ${team.country}</span>` : ""}
              <span class="token">🎟 ${team.verifTokens}</span>
              ${team.streak >= 2 ? `<span class="streak-chip ${team.streak>=3?"hot":""}">${txt("streak", {n:team.streak})}</span>` : ""}
            </div>
          </div>
          <div class="score">${team.score}</div>

function renderRoundIntro(){
  state.screen = "round_intro";
  updateChromeText();
  const rounds = activeRounds();
  const round = rounds[state.roundIndex];
  const humor = activeHumor();
  setFoot(humor.intro[Math.floor(Math.random()*humor.intro.length)]);

  el.screen.innerHTML = `
    <div class="row" style="justify-content:space-between; align-items:flex-start">
      <div>
        <div class="kicker">${txt("roundOf", {n: state.roundIndex + 1, total: rounds.length})}</div>
        <h2 class="display" style="margin-bottom:6px">${txt("rollDie")}</h2>
        <p class="lead" style="margin:0">${txt("rollLead")}</p>
      </div>
      <div class="chip cyan">${txt("modeLabel", {mode: state.mode === "multi" ? txt("multiDeviceLower") : txt("oneDeviceLower")})}</div>
    </div>

    ${renderTeamStrip()}

    <div class="roll-stage">
      <div class="die-wrap"><div class="die" id="die">${TYPES[round.type].icon}</div></div>
      <div id="dieLabel" class="tiny mono" style="color:var(--mute); letter-spacing:.2em">${txt("tapToRoll")}</div>
      <div id="dieResult" style="display:none">
        <div class="round-type-label">
          <span style="font-size:18px">${TYPES[round.type].icon}</span>
          <span>${escapeHtml(typeLabel(round.type))}</span>
        </div>
        <p class="narration" style="text-align:left; margin-top:18px; max-width:560px">${escapeHtml(typeDesc(round.type))}</p>
      </div>
    </div>

    <div class="actions" style="justify-content:center">
      <button class="primary big" id="rollBtn">${txt("roll")}</button>
      <button class="success big" id="toEvidenceBtn" style="display:none">${txt("openEvidence")}</button>
    </div>
  `;

  const isGuest = state.mode === "multi" && state.peerRole === "guest";
  if(isGuest){
    $("rollBtn").style.display = "none";
    $("dieLabel").textContent = txt("hostRolling");
  }

  on($("rollBtn"), "click", () => {
    playRoll();
    const die = $("die");
    die.classList.add("rolling");
    $("rollBtn").disabled = true;
    setTimeout(() => {
      die.classList.remove("rolling");
      die.textContent = TYPES[round.type].icon;
      $("dieLabel").style.display = "none";
      $("dieResult").style.display = "block";
      $("rollBtn").style.display = "none";
      $("toEvidenceBtn").style.display = "inline-flex";
      playTransition();
    }, 1650);
  });

  on($("toEvidenceBtn"), "click", () => {
    playClick();
    state.screen = "round_play";
    if(state.mode === "multi" && state.peerRole === "host"){
      broadcastFromHost({ type:"state", data:{ screen:"round_play", roundIndex:state.roundIndex, teams:state.teams, teamCount:state.teamCount }});
    }
    renderRoundPlay();
  });
}

   8b) ROUND PLAY/* ============================================================
   8b) ROUND PLAY · evidence card + team answer modal
   ============================================================ */

function renderRoundPlay(){
  state.screen = "round_play";
  updateChromeText();
  const rounds = activeRounds();
  const round = rounds[state.roundIndex];
  const humor = activeHumor();
  setFoot(humor.waiting[Math.floor(Math.random()*humor.waiting.length)]);

  state._answerQueue = null;

  const dataRows = Object.entries(round.data).map(([k,v]) => `
    <div class="metric">
      <div class="m-label">${escapeHtml(k)}</div>
      <div class="m-value">${escapeHtml(v)}</div>
    </div>
  `).join("");

  const obs = round.observations.map(o => `<li>${escapeHtml(o)}</li>`).join("");

  const teamStatus = state.teams.map(team => {
    const sub = state.submissions[team.id];
    const locked = !!sub;
    return `
      <div class="team-card ${locked?"":""}" style="${locked?"border-color:rgba(125,242,180,.4)":""}">
        <div class="team-head">
          <div>
            <div class="name">${escapeHtml(team.icon)} ${escapeHtml(team.name)}</div>
            <div class="meta">
              <span class="token">🎟 ${team.verifTokens}</span>
              ${locked ? `<span class="chip green">${txt("locked")}</span>` : `<span class="chip">${txt("awaiting")}</span>`}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join("");

  const isMultiGuest = state.mode === "multi" && state.peerRole === "guest";
  const isMultiHost  = state.mode === "multi" && state.peerRole === "host";
  const isOneDevice  = state.mode === "one";

  let actionBlock = "";
  if(isOneDevice){
    actionBlock = `
      <p class="lead" style="margin-top:14px">${txt("hotseatLead")}</p>
      <button class="primary big" id="startHotSeat">${txt("startHotseat")}</button>
    `;
  } else if(isMultiHost){
    actionBlock = `
      <p class="lead" style="margin-top:14px">${txt("hostAnswerLead")}</p>
      <button class="primary big" id="myTurnBtn">${txt("myAnswerSheet")}</button>
      <p class="tiny" style="margin-top:8px; color:var(--mute)">${txt("allLockedResolve")}</p>
    `;
  } else if(isMultiGuest){
    actionBlock = `
      <p class="lead" style="margin-top:14px">${txt("guestAnswerLead")}</p>
      <button class="primary big" id="myTurnBtn">${txt("ourAnswerSheet")}</button>
      <p class="tiny" style="margin-top:8px; color:var(--mute)">${txt("scoresUpdate")}</p>
    `;
  }

  el.screen.innerHTML = `
    <div class="row" style="justify-content:space-between; align-items:flex-start">
      <div>
        <div class="kicker">${txt("roundOf", {n: state.roundIndex + 1, total: rounds.length})} · ${escapeHtml(typeLabel(round.type))}</div>
        <h2 class="display" style="margin-bottom:6px">${escapeHtml(round.title)}</h2>
        <div class="chips">
          <span class="chip cyan">${TYPES[round.type].icon} ${escapeHtml(typeLabel(round.type))}</span>
          <span class="chip">${escapeHtml(round.location)}</span>
          <span class="chip">${escapeHtml(round.conditions)}</span>
        </div>
      </div>
    </div>

    <div class="evidence-grid">
      <div class="panel">
        <h3>${txt("fieldObservations")}</h3>
        <ul class="evidence-list">${obs}</ul>
        <div class="flavor">${escapeHtml(round.flavor)}</div>
      </div>
      <div class="panel">
        <h3>${txt("measurements")}</h3>
        <div class="metric-grid">${dataRows}</div>
      </div>
    </div>

    <div class="score-strip" style="--cols:${state.teams.length}; margin-top:18px">${teamStatus}</div>

    ${actionBlock}
  `;

  if(isOneDevice){
    on($("startHotSeat"), "click", () => {
      playClick();
      state._answerQueue = state.teams.slice().sort(()=>Math.random()-0.5).map(team => team.id);
      processNextTeam();
    });
  } else {
    on($("myTurnBtn"), "click", () => {
      playClick();
      let myId;
      if(state.peerRole === "guest"){
        myId = state.myTeamId || (state.teams[0] && state.teams[0].id);
      } else {
        myId = state.teams[0] && state.teams[0].id;
      }
      if(!myId){ alert(txt("notAssigned")); return; }
      openAnswerModal(myId);
    });
  }
}

function processNextTeam(){
  if(!state._answerQueue || state._answerQueue.length === 0){
    // All teams done — resolve round
    evaluateRound();
    return;
  }
  const nextId = state._answerQueue.shift();
  const team = state.teams.find(t => t.id === nextId);
  showHandoff(team, () => {
    openAnswerModal(nextId);
  });
}

function openAnswerModal(teamId){
  state.currentModalTeam = teamId;
  const team = state.teams.find(t => t.id === teamId);
  const getRounds = () => activeRounds();
  const getRound = () => getRounds()[state.roundIndex];
  state.hintsRevealed[teamId] = state.hintsRevealed[teamId] || {};
  state.verifShown[teamId] = state.verifShown[teamId] || false;

  const sel = state._answerSel = {};

  const renderModalBody = () => {
    const rounds = getRounds();
    const round = getRound();
    const hints = activeHints()[state.roundIndex] || [];
    const questionsHtml = round.questions.map((q, qi) => {
      const optsHtml = q.options.map((opt, oi) => `
        <label class="option" data-qi="${qi}" data-oi="${oi}">
          <input type="radio" name="q${qi}" value="${oi}">
          <span class="mark">${sel[qi] === oi ? "✓" : ""}</span>
          <span>${escapeHtml(opt)}</span>
        </label>
      `).join("");
      const isHintShown = !!state.hintsRevealed[teamId][qi];
      const hintHtml = isHintShown ? `<div class="hint-box">💡 ${hints[qi] || txt("readDataAgain")}</div>` :
        `<button class="hint-btn" data-hint="${qi}">${txt("showHint")}</button>`;
      return `
        <div class="question" data-q="${qi}">
          <div class="q-head">
            <div class="q-title">${qi+1}. ${escapeHtml(q.text)}</div>
            <div class="q-pts">${formatPoints(q.points)}</div>
          </div>
          <div class="options">${optsHtml}</div>
          ${hintHtml}
        </div>
      `;
    }).join("");

    const verifAvailable = team.verifTokens > 0 && team.verifUsedRound !== state.roundIndex && !state.verifShown[teamId];
    const verifShown = !!state.verifShown[teamId];

    return `
      <div class="modal-header">
        <div>
          <div class="kicker">${txt("roundOf", {n: state.roundIndex + 1, total: rounds.length})} · ${escapeHtml(typeLabel(round.type))}</div>
          <h2 class="section">${escapeHtml(team.icon)} ${escapeHtml(team.name)} · ${txt("answerSheet")}</h2>
          <div class="tiny mono" style="color:var(--mute); margin-top:4px">${txt("lockAllSubmit")}</div>
        </div>
        <div class="row" style="gap:8px">
          <div id="modalLangButtons" class="language-row" aria-label="Language selection"></div>
          <div class="timer" id="modalTimer"><div class="num" id="timerNum">90</div><div class="tiny mono">${txt("seconds")}</div></div>
        </div>
      </div>
      <div id="qList">${questionsHtml}</div>

      ${verifShown ? `
        <div class="clue-box">
          <strong>${txt("extraClue")}</strong> ${escapeHtml(round.extraClue)}
        </div>
      ` : (verifAvailable ? `
        <div class="verif-row">
          <div>
            <strong>${txt("verifToken", {n: team.verifTokens})}</strong>
            <div class="tiny" style="color:var(--mute)">${txt("verifHelp")}</div>
          </div>
          <button class="btn" id="useVerif">${txt("useToken")}</button>
        </div>
      ` : "")}

      <div class="actions">
        <button class="ghost" id="cancelModal">${txt("pause")}</button>
        <button class="primary big" id="lockBtn" disabled>${txt("lockAll")}</button>
      </div>
    `;
  };

  const updateLockState = () => {
    const round = getRound();
    const allAnswered = round.questions.every((_, qi) => typeof sel[qi] === "number");
    const lockBtn = $("lockBtn");
    if(lockBtn){
      lockBtn.disabled = !allAnswered;
      lockBtn.textContent = allAnswered ? txt("lockAllArrow") : txt("lockAllCount", {done:Object.keys(sel).length, total:round.questions.length});
    }
  };

  const restoreSelections = () => {
    Object.entries(sel).forEach(([qi, oi]) => {
      const opt = el.modal.querySelector(`.option[data-qi="${qi}"][data-oi="${oi}"]`);
      if(opt){
        opt.classList.add("selected");
        opt.querySelector(".mark").textContent = "✓";
      }
    });
  };

  const wireModal = () => {
    document.querySelectorAll(".option").forEach(opt => {
      on(opt, "click", e => {
        e.preventDefault();
        playClick();
        const qi = Number(opt.dataset.qi);
        const oi = Number(opt.dataset.oi);
        sel[qi] = oi;
        opt.parentElement.querySelectorAll(".option").forEach(o => {
          o.classList.toggle("selected", o === opt);
          const mark = o.querySelector(".mark");
          mark.textContent = o === opt ? "✓" : "";
        });
        updateLockState();
      });
    });
    document.querySelectorAll(".hint-btn").forEach(btn => {
      on(btn, "click", () => {
        playClick();
        const qi = Number(btn.dataset.hint);
        state.hintsRevealed[teamId][qi] = true;
        el.modal.innerHTML = renderModalBody();
        wireModal();
        startModalTimer();
        restoreSelections();
        updateLockState();
      });
    });
    const modalLangButtons = $("modalLangButtons");
    if(modalLangButtons){
      modalLangButtons.innerHTML = Object.keys(LANGUAGE_META).map(code => {
        const meta = LANGUAGE_META[code];
        const active = code === state.lang;
        return `<button type="button" class="ghost lang-btn ${active ? "active" : ""}" data-lang="${code}" aria-pressed="${active ? "true" : "false"}" title="${escapeHtml(meta.label)}">${meta.short}</button>`;
      }).join("");
      modalLangButtons.querySelectorAll("[data-lang]").forEach(btn => {
        on(btn, "click", () => {
          const lang = btn.getAttribute("data-lang");
          if(!lang || lang === state.lang) return;
          playClick();
          state.lang = isSupportedLang(lang) ? lang : "en";
          try{ localStorage.setItem("gow_field_op_lang", state.lang); }catch(e){}
          updateChromeText();
          el.modal.innerHTML = renderModalBody();
          wireModal();
          startModalTimer();
          restoreSelections();
          updateLockState();
        });
      });
    }
    const useVerifBtn = $("useVerif");
    if(useVerifBtn){
      on(useVerifBtn, "click", () => {
        playClick();
        team.verifTokens = Math.max(0, team.verifTokens - 1);
        team.verifUsedRound = state.roundIndex;
        state.verifShown[teamId] = true;
        el.modal.innerHTML = renderModalBody();
        wireModal();
        startModalTimer();
        restoreSelections();
        updateLockState();
      });
    }
    on($("cancelModal"), "click", () => {
      if(confirm(txt("pauseConfirm"))){
        clearTimer();
        el.modalBackdrop.classList.remove("show");
      }
    });
    on($("lockBtn"), "click", () => {
      playClick();
      clearTimer();
      submitTeamAnswers(teamId, sel);
    });
  };

  const startModalTimer = () => {
    clearTimer();
    state.timeLeft = 120;
    const num = $("timerNum");
    if(!num) return;
    num.textContent = state.timeLeft;
    state.timer = setInterval(() => {
      state.timeLeft--;
      if($("timerNum")) $("timerNum").textContent = Math.max(0, state.timeLeft);
      if(state.timeLeft <= 15) $("modalTimer")?.classList.add("urgent");
      if(state.timeLeft <= 5 && state.timeLeft > 0) playTick();
      if(state.timeLeft <= 0){
        clearTimer();
        submitTeamAnswers(teamId, sel);
      }
    }, 1000);
  };

  el.modal.innerHTML = renderModalBody();
  el.modalBackdrop.classList.add("show");
  wireModal();
  updateLockState();
  startModalTimer();
}

function submitTeamAnswers(teamId, sel){
  const round = activeRounds()[state.roundIndex];
  // Compute submission detail
  const detail = round.questions.map((q, qi) => {
    const chosen = typeof sel[qi] === "number" ? sel[qi] : -1;
    const correct = chosen === q.correct;
    return { qi, chosen, correct, points: correct ? q.points : 0, role: q.role };
  });
  const gain = detail.reduce((acc, d) => acc + d.points, 0);
  const isPerfect = gain === 8;
  const hintsUsedThisRound = Object.keys(state.hintsRevealed[teamId] || {}).length > 0;
  const verifUsedThisRound = state.verifShown[teamId] === true;

  state.submissions[teamId] = { sel:{...sel}, detail, gain, isPerfect, hintsUsedThisRound, verifUsedThisRound };

  el.modalBackdrop.classList.remove("show");

  if(state.mode === "one"){
    // Continue hot-seat
    processNextTeam();
  } else if(state.mode === "multi" && state.peerRole === "guest"){
    // Send to host
    if(state.peerHostConn){
      try{
        state.peerHostConn.send({ type:"submit", teamId, submission: state.submissions[teamId] });
      }catch(e){}
    }
    // Wait for host to broadcast results
    renderRoundPlay(); // refresh to show "locked"
  } else if(state.mode === "multi" && state.peerRole === "host"){
    checkAllSubmitted();
    renderRoundPlay(); // refresh to show "locked"
  }
}

function checkAllSubmitted(){
  if(state.peerRole !== "host") return;
  const allIn = state.teams.every(t => !!state.submissions[t.id]);
  if(allIn){
    evaluateRound();
  } else {
    renderRoundPlay();
  }
}

/* ============================================================
   8c) ROUND RESOLUTION
   ============================================================ */
function evaluateRound(){
  const round = activeRounds()[state.roundIndex];
  // Apply scores & medals tracking
  const roundResults = {};
  state.teams.forEach(t => {
    let sub = state.submissions[t.id];
    if(!sub){
      // Team never answered: gain 0
      sub = state.submissions[t.id] = { sel:{}, detail:round.questions.map((q,qi)=>({qi,chosen:-1,correct:false,points:0,role:q.role})), gain:0, isPerfect:false, hintsUsedThisRound:false, verifUsedThisRound:false };
    }
    t.score += sub.gain;
    if(sub.isPerfect){
      t.perfectRounds++;
      t.streak++;
      t.bestStreak = Math.max(t.bestStreak, t.streak);
      if(!sub.hintsUsedThisRound) t.hintFreeRounds++;
    } else {
      t.streak = 0;
    }
    // Track per-role correctness for medals
    sub.detail.forEach(d => {
      if(d.correct){
        if(d.role === "evid") t.correctEvidence++;
        else if(d.role === "action") t.correctAction++;
        else if(d.role === "civic") t.correctCivic++;
      }
    });
    sub.reaction = pickReaction(sub.gain);
    roundResults[t.id] = { gain: sub.gain, isPerfect: sub.isPerfect, hintFreePerfect: sub.isPerfect && !sub.hintsUsedThisRound };
  });
  state.allRoundResults[state.roundIndex] = roundResults;

  if(state.mode === "multi" && state.peerRole === "host"){
    // Send results to all guests
    broadcastFromHost({ type:"results", submissions: state.submissions, teams: state.teams, allRoundResults: state.allRoundResults });
    broadcastFromHost({ type:"state", data:{ screen:"round_results", roundIndex: state.roundIndex, teams: state.teams, teamCount: state.teamCount }});
  }

  state.screen = "round_results";
  renderRoundResults();
}

function renderRoundResults(){
  state.screen = "round_results";
  updateChromeText();
  const rounds = activeRounds();
  const round = rounds[state.roundIndex];
  const humor = activeHumor();
  setFoot(humor.results[Math.floor(Math.random()*humor.results.length)]);

  const answerKey = round.questions.map((q, qi) => `
    <div class="answer-key-item">
      <div class="row" style="justify-content:space-between; align-items:flex-start">
        <div style="flex:1">
          <div class="tiny mono" style="color:var(--mute); letter-spacing:.1em">Q${qi+1} · ${roleLabel(q.role)}</div>
          <div style="font-weight:600; margin-top:3px">${escapeHtml(q.text)}</div>
        </div>
        <div class="pts-pill">${formatPoints(q.points)}</div>
      </div>
      <div style="margin-top:8px; color:#dffff0; font-weight:500">
        ✓ ${escapeHtml(q.options[q.correct])}
      </div>
    </div>
  `).join("");

  const teamResults = state.teams.map(team => {
    const sub = state.submissions[team.id] || { gain:0, detail:[], reaction:"" };
    const perfectBadge = sub.isPerfect ? `<span class="perfect-badge">${txt("perfect")}</span>` : "";
    const breakdown = sub.detail.map(d => {
      const q = round.questions[d.qi];
      const userOpt = d.chosen >= 0 ? escapeHtml(q.options[d.chosen]) : `<em>${txt("noAnswer")}</em>`;
      const symbol = d.correct ? "✓" : "✗";
      const color = d.correct ? "var(--green)" : "var(--red)";
      return `<div class="tiny" style="margin-top:4px"><span style="color:${color}; font-weight:700">${symbol}</span> Q${d.qi+1}: ${userOpt}</div>`;
    }).join("");
    return `
      <div class="result-team">
        <div class="row" style="justify-content:space-between; align-items:flex-start">
          <div>
            <div style="font-weight:700; font-size:15px">${escapeHtml(team.icon)} ${escapeHtml(team.name)}${perfectBadge}</div>
            ${team.country ? `<div class="tiny" style="color:var(--mute)">${(COUNTRIES.find(c=>c.code===team.country)||{}).flag||""} ${team.country}</div>` : ""}
          </div>
          <div class="gain ${sub.gain>0?"positive":""}">+${sub.gain}</div>
        </div>
        ${breakdown}
        <div class="reaction-beat">${escapeHtml(sub.reaction || "")}</div>
        ${sub.hintsUsedThisRound ? `<div class="hint-recap">${txt("hintUsed")}</div>` : ""}
      </div>
    `;
  }).join("");

  const isLast = state.roundIndex + 1 >= rounds.length;
  const nextBtnLabel = isLast ? txt("revealFinal") : txt("continueRound", {n: state.roundIndex + 2});

  el.screen.innerHTML = `
    <div class="kicker">${txt("roundOf", {n: state.roundIndex + 1, total: rounds.length})} · ${txt("resolution")}</div>
    <h2 class="display" style="margin-bottom:6px">${escapeHtml(round.title)} · ${txt("resolved")}</h2>
    <p class="narration" style="max-width:780px">${escapeHtml(round.explanation)}</p>

    ${renderTeamStrip()}

    <div class="resolution-grid" style="margin-top:18px">
      <div class="panel">
        <h3 style="margin-top:0">${txt("answerKey")}</h3>
        ${answerKey}
      </div>
      <div class="panel">
        <h3 style="margin-top:0">${txt("teamsScored")}</h3>
        ${teamResults}
      </div>
    </div>

    <div class="actions" style="justify-content:flex-end">
      <button class="primary big" id="nextRoundBtn">${nextBtnLabel}</button>
    </div>
  `;

  const anyPerfect = state.teams.some(t => state.submissions[t.id]?.isPerfect);
  if(anyPerfect) playCorrect(); else playTransition();

  const isGuest = state.mode === "multi" && state.peerRole === "guest";
  if(isGuest){
    $("nextRoundBtn").style.display = "none";
  }

  on($("nextRoundBtn"), "click", () => {
    playClick();
    if(isLast){
      state.screen = "final";
      if(state.mode === "multi" && state.peerRole === "host"){
        broadcastFromHost({ type:"state", data:{ screen:"final", teams:state.teams, teamCount:state.teamCount }});
      }
      renderFinal();
    } else {
      state.roundIndex++;
      state.submissions = {};
      state.hintsRevealed = {};
      state.verifShown = {};
      if(state.mode === "multi" && state.peerRole === "host"){
        broadcastFromHost({ type:"state", data:{ screen:"round_intro", roundIndex:state.roundIndex, teams:state.teams, teamCount:state.teamCount }});
      }
      renderRoundIntro();
    }
  });
}

/* ============================================================
   8d) FINAL CELEBRATION/* ============================================================
   8d) FINAL CELEBRATION · the show
   ============================================================ */

function awardMedals(){
  state.teams.forEach(t => {
    t.medals = activeMedals().filter(m => {
      try{ return m.test(t, state); }catch(e){ return false; }
    });
  });
}

function animateCount(node, from, to, durationMs){
  if(!node) return;
  const start = performance.now();
  const tick = (now) => {
    const t = Math.min(1, (now - start) / durationMs);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
    const value = Math.round(from + (to - from) * eased);
    node.textContent = value;
    if(t < 1) requestAnimationFrame(tick);
    else node.textContent = to;
  };
  requestAnimationFrame(tick);
}

function renderFinal(){
  state.screen = "final";
  updateChromeText();
  setFoot(txt("operationComplete"));
  awardMedals();

  const sorted = state.teams.slice().sort((a, b) => b.score - a.score);
  const winner = sorted[0];
  const isTie = sorted.length > 1 && sorted[0].score === sorted[1].score;

  el.screen.innerHTML = `
    <div class="celebration">
      <div class="countdown-stage" id="calcStage">
        <div class="kicker">${txt("finalTally")}</div>
        <h2 class="display" style="text-align:center">${txt("calculating")}</h2>
        <div class="drumroll-bar"></div>
        <div class="tiny mono" style="color:var(--mute); letter-spacing:.2em">${txt("verifyScores")}</div>
      </div>
    </div>
  `;
  playDrumRoll(1400);

  setTimeout(() => {
    runCountdown(() => {
      runReveal(winner, sorted, isTie);
    });
  }, 1500);
}

function runCountdown(done){
  const stage = $("calcStage");
  if(!stage) { done(); return; }

  const sequence = ["3", "2", "1"];
  let i = 0;

  const step = () => {
    if(i >= sequence.length){ done(); return; }
    const n = sequence[i++];
    stage.innerHTML = `
      <div class="countdown-num">${n}</div>
      <div class="countdown-label">${i === 1 ? txt("countLabel1") : i === 2 ? txt("countLabel2") : txt("countLabel3")}</div>
    `;
    playDrumKick();
    setTimeout(step, 850);
  };
  step();
}

function runReveal(winner, sorted, isTie){
  const screen = el.screen;
  $("revealGlow").classList.add("on");
  confetti.burst(180, window.innerWidth/2, window.innerHeight * 0.30);
  setTimeout(() => confetti.burst(80, window.innerWidth*0.18, window.innerHeight*0.42), 280);
  setTimeout(() => confetti.burst(80, window.innerWidth*0.82, window.innerHeight*0.42), 420);

  playFanfare();

  const humor = activeHumor();
  const winnerLine = humor.winnerLines[Math.floor(Math.random()*humor.winnerLines.length)];
  const allCountries = [...new Set(state.teams.map(t => t.country).filter(Boolean))];
  const flagsHtml = allCountries.length ? `
    <div class="country-flags">
      ${allCountries.map(code => {
        const c = COUNTRIES.find(x => x.code === code);
        return `<div class="country-flag" title="${escapeHtml(countryName(code)||"")}">${c?.flag||""}</div>`;
      }).join("")}
    </div>
  ` : "";

  const standings = `
    <table class="standings-table">
      <thead>
        <tr><th>#</th><th>${txt("team")}</th><th>${txt("country")}</th><th style="text-align:right">${txt("score")}</th><th>${txt("medals")}</th></tr>
      </thead>
      <tbody>
        ${sorted.map((team, i) => `
          <tr class="${i===0 ? "winner-row" : ""}">
            <td class="rank">${i+1}</td>
            <td>${escapeHtml(team.icon)} <strong>${escapeHtml(team.name)}</strong></td>
            <td>${team.country ? `${(COUNTRIES.find(c=>c.code===team.country)||{}).flag||""} ${team.country}` : "—"}</td>
            <td class="pts" style="text-align:right">${team.score}</td>
            <td>${team.medals.map(m => `<span class="chip violet" title="${escapeHtml(m.line)}">${m.icon} ${escapeHtml(m.label)}</span>`).join(" ")}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  screen.innerHTML = `
    <div class="celebration">
      <div class="trophy-stage">
        <div class="winner-banner">${isTie ? txt("sharedVictory") : txt("winningTeam")}</div>
        <h1 class="winner-name">${escapeHtml(winner.icon)} ${escapeHtml(winner.name)}</h1>
        <div>
          <div class="winner-score" id="winnerScoreNum">0</div>
          <div class="winner-score-label">${txt("pointsOut")}</div>
        </div>
        ${flagsHtml}
        <p class="winner-flavor">${escapeHtml(winnerLine)}</p>

        <div class="panel" style="margin-top:24px; text-align:left">
          <h3 style="margin-top:0">${txt("finalStandings")}</h3>
          ${standings}
        </div>

        <div class="actions" style="justify-content:center; margin-top:24px">
          <button class="primary big" id="playAgainBtn">${txt("playAgain")}</button>
          <button class="big" id="downloadTrophy">${txt("downloadTrophy")}</button>
        </div>
        <p class="tiny" style="margin-top:14px; color:var(--mute)">${txt("resetTip")}</p>
      </div>
    </div>
  `;

  animateCount($("winnerScoreNum"), 0, winner.score, 1800);

  let tickCount = 0;
  const tickInterval = setInterval(() => {
    playTick();
    tickCount++;
    if(tickCount >= Math.min(winner.score, 16)){
      clearInterval(tickInterval);
    }
  }, 90);

  setTimeout(() => {
    confetti.burst(120, window.innerWidth/2, window.innerHeight * 0.45);
  }, 1400);

  on($("playAgainBtn"), "click", () => { playClick(); resetGame(); });
  on($("downloadTrophy"), "click", () => { playClick(); downloadTrophyCard(winner, sorted); });
}

/* ---------- Trophy PNG download/* ---------- Trophy PNG download (canvas-rendered) ---------- */
function downloadTrophyCard(winner, sorted){
  const W = 1200, H = 1500;
  const c = document.createElement("canvas");
  c.width = W; c.height = H;
  const ctx = c.getContext("2d");

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, "#0d2740");
  bg.addColorStop(0.55, "#071827");
  bg.addColorStop(1, "#03101e");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Decorative arc
  ctx.strokeStyle = "rgba(116,230,255,.18)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(W/2, H*0.18, 540, Math.PI, 2*Math.PI);
  ctx.stroke();

  ctx.fillStyle = "#74e6ff";
  ctx.font = "600 30px Manrope, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("★  " + txt("brandTitle").toUpperCase() + " · FIELD OP  ★", W/2, 110);

  ctx.fillStyle = "#8298b1";
  ctx.font = "500 22px Manrope, sans-serif";
  ctx.fillText(txt("trophySubtitle"), W/2, 150);

  // Winner banner
  ctx.fillStyle = "#ffe090";
  ctx.font = "700 42px Manrope, sans-serif";
  ctx.fillText(txt("trophyWinning"), W/2, 260);

  // Winner name
  ctx.fillStyle = "#eef5ff";
  ctx.font = "700 92px Fraunces, serif";
  const winnerLabel = (winner.icon || "") + "  " + winner.name;
  ctx.fillText(winnerLabel, W/2, 360);

  // Winner score
  ctx.fillStyle = "#74e6ff";
  ctx.font = "700 180px Fraunces, serif";
  ctx.fillText(String(winner.score), W/2, 560);

  ctx.fillStyle = "#bccee2";
  ctx.font = "500 26px Manrope, sans-serif";
  ctx.fillText(txt("pointsOut"), W/2, 600);

  // Divider
  ctx.strokeStyle = "rgba(255,255,255,.16)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(180, 680); ctx.lineTo(W-180, 680);
  ctx.stroke();

  // Standings
  ctx.textAlign = "left";
  let y = 760;
  ctx.fillStyle = "#74e6ff";
  ctx.font = "600 28px Manrope, sans-serif";
  ctx.fillText(txt("trophyStandings"), 180, y);
  y += 50;
  ctx.font = "500 26px Manrope, sans-serif";
  sorted.forEach((t, i) => {
    ctx.fillStyle = i === 0 ? "#ffe090" : "#eef5ff";
    const country = t.country ? "  ·  " + t.country : "";
    ctx.fillText(`${i+1}.  ${t.icon}  ${t.name}${country}`, 200, y);
    ctx.textAlign = "right";
    ctx.fillText(`${t.score} ${txt("pts")}`, W-200, y);
    ctx.textAlign = "left";
    y += 50;
  });

  // Date and flavor
  y = H - 200;
  ctx.fillStyle = "#a8f1ff";
  ctx.font = "italic 500 24px Fraunces, serif";
  ctx.textAlign = "center";
  ctx.fillText((activeHumor().winnerLines[2] || ""), W/2, y);
  ctx.fillStyle = "#8298b1";
  ctx.font = "500 18px Manrope, sans-serif";
  ctx.fillText("guardians-of-our-waters · field op · " + new Date().toLocaleDateString(), W/2, y + 50);

  // Country flags row
  const countries = [...new Set(state.teams.map(t => t.country).filter(Boolean))];
  if(countries.length){
    const flagY = H - 80;
    const total = countries.length;
    const spacing = 50;
    const startX = W/2 - ((total - 1) * spacing) / 2;
    ctx.font = "500 40px Manrope, sans-serif";
    countries.forEach((code, i) => {
      const c = COUNTRIES.find(x => x.code === code);
      ctx.fillText(c?.flag || "", startX + i*spacing, flagY);
    });
  }

  // Trigger download
  c.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "guardians_of_our_waters_trophy.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  });
}

function openHelp(){
  updateChromeText();
  el.modal.innerHTML = `
    <div class="modal-header">
      <h2 class="section">${txt("helpTitle")}</h2>
      <button class="ghost" id="closeHelp">${txt("close")}</button>
    </div>
    <div class="stack">
      <p>${txt("helpP1")}</p>
      <p>${txt("helpOne")}</p>
      <p>${txt("helpMulti")}</p>
      <p>${txt("helpScoring")}</p>
      <p>${txt("helpHints")}</p>
      <p>${txt("helpTokens")}</p>
    </div>
  `;
  el.modalBackdrop.classList.add("show");
  on($("closeHelp"), "click", () => { playClick(); el.modalBackdrop.classList.remove("show"); });
}
function boot(){
  el.screen = $("screen");
  el.modalBackdrop = $("modalBackdrop");
  el.modal = $("modal");
  el.handoff = $("handoffBackdrop");
  el.handoffCard = $("handoffCard");
  confetti.init();
  updateChromeText();
  on($("audioToggle"), "click", () => { unlockAudio(); toggleAudio(); playClick(); });

  on($("helpBtn"), "click", () => { playClick(); openHelp(); });
  on($("resetBtn"), "click", () => { playClick(); if(confirm(txt("resetConfirm"))) resetGame(); });
  document.addEventListener("click", () => unlockAudio(), { once: true });
  renderSplash();
  ambientStart();
}
if(document.readyState === "loading"){
  window.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
